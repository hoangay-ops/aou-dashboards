<style>
*{box-sizing:border-box;margin:0;padding:0;}
/* EMBED FIX: removed `overflow:auto` from body to prevent the iframe from
   forcing its own scroll context. Natural document flow handles scroll
   correctly in both embedded and standalone modes. */
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f8fa;color:#1a1a1a;font-size:14px;}
button,select,input{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#d8d8d8;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#bbb;}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #dbe7f3;padding:0 18px;flex-shrink:0;gap:5px;}
.tab{padding:10px 18px;border:1px solid transparent;background:transparent;font-size:14px;font-weight:700;color:#6f7f8f;cursor:pointer;border-bottom:4px solid transparent;margin-bottom:-1px;transition:color .12s,border-color .12s,background .12s,box-shadow .12s;letter-spacing:.2px;border-radius:10px 10px 0 0;}
.tab:hover{color:#2471A3;}
.tab.active{color:#185FA5;border-color:#C8DCF0;border-bottom-color:#185FA5;background:#EBF5FB;box-shadow:inset 0 -1px 0 #185FA5;}

/* EMBED MODE STYLES — activated when the <body> has class "aou-embedded".
   When embedded in Google Sites, the dashboard flows as one long page
   with a sticky header + tab bar, rather than filling a captive viewport
   with internal scroll containers.
   Note: display properties are preserved (not forced to block) so nested
   flex layouts like the Roadmap timeline continue to work correctly.
   We only neutralize the constraining properties (overflow, height, flex). */
body.aou-embedded #root{min-height:0;height:auto;}
body.aou-embedded .aou-app-shell{height:auto;}
body.aou-embedded .aou-sticky-shell{position:sticky;top:0;z-index:50;background:#fff;box-shadow:0 1px 0 #ececec, 0 2px 4px rgba(0,0,0,.04);}
body.aou-embedded .aou-view-container{flex:none;overflow:visible;height:auto;}
body.aou-embedded .aou-view-scroll{flex:none;overflow:visible;height:auto;}

/* EMBED MODE: modal backdrop for drill-downs. Centered on browser viewport,
   dimmed background, close on backdrop/Escape/X. Inner content scrolls
   independently if content exceeds max-height. */
.aou-modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(20,30,45,.46);
  z-index:2000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}
.aou-modal-panel{
  width:560px;
  max-width:calc(100vw - 40px);
  max-height:calc(100vh - 80px);
  background:#fff;
  border-radius:12px;
  box-shadow:0 20px 50px rgba(0,0,0,.28);
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}
.aou-modal-panel .aou-modal-close{
  position:absolute;
  top:12px;
  right:14px;
  border:none;
  background:transparent;
  font-size:26px;
  color:#aaa;
  cursor:pointer;
  padding:0 6px;
  line-height:1;
  z-index:10;
}
.aou-modal-panel .aou-modal-close:hover{color:#555;}
.aou-modal-panel .aou-modal-inner{
  overflow-y:auto;
  overscroll-behavior:contain;
  flex:1;
  display:flex;
  flex-direction:column;
}

/* EMBED MODE: Back-to-top floating button */
.aou-back-to-top{
  position:fixed;
  bottom:18px;
  right:18px;
  z-index:1500;
  padding:8px 14px;
  border-radius:20px;
  background:#185FA5;
  color:#fff;
  border:none;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.22);
  display:inline-flex;
  align-items:center;
  gap:6px;
}
</style>
