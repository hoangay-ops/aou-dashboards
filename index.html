            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── The Capacity view component ────────────────────────────────────── */

function CapacityView(props){
  var data = props.data;
  var [drill, setDrill] = useState(null);
  var [goalFilter, setGoalFilter] = useState("all");
  var [tierFilter, setTierFilter] = useState("all");
  var [search, setSearch] = useState("");
  var [teamFilter, setTeamFilter] = useState([]);
  var [sortState, setSortState] = useState({col:"ci", dir:"asc"});
  var [bannerDismissed, setBannerDismissed] = useState(false);

  var initiatives = useMemo(function(){
    if(data.state.status !== "ready") return [];
    return capParseInitiatives(data.state.planningCsv);
  }, [data.state.status, data.state.planningCsv]);

  var capData = useMemo(function(){
    if(data.state.status !== "ready") return {_mismatches: []};
    return capParseCapacity(data.state.capacityCsv);
  }, [data.state.status, data.state.capacityCsv]);

  var goalsRef = useMemo(function(){
    if(data.state.status !== "ready") return {};
    return qpeNormalizeGoals(data.state.goalsCsv);
  }, [data.state.status, data.state.goalsCsv]);

  var mismatches = capData._mismatches || [];

  // Reset dismissed flag when mismatches change (new mismatches = new alert).
  useEffect(function(){
    setBannerDismissed(false);
  }, [mismatches.length]);

  // If a sibling view navigated here, open that drill-down.
  useEffect(function(){
    if(props.selectedInitiativeId && initiatives.length > 0){
      var match = initiatives.find(function(i){return i.id === props.selectedInitiativeId;});
      if(match) setDrill(match.id);
    }
  }, [props.selectedInitiativeId, initiatives]);

  var items = useMemo(function(){
    return initiatives.map(function(i){return {init:i, cap:capData[i.id] || null};});
  }, [initiatives, capData]);

  // Single classification of CI tier — all downstream counts derive from this.
  var buckets = useMemo(function(){
    var high = [], med = [], risk = [], awaiting = [];
    var goalHealth = {};
    Object.keys(GOALS).forEach(function(k){goalHealth[k] = {high:0, med:0, risk:0, noData:0, total:0};});
    items.forEach(function(x){
      var gh = goalHealth[x.init.goal];
      if(gh) gh.total++;
      var tier = capCiTier(x.cap ? x.cap.ciNum : null);
      if(tier === "none"){awaiting.push(x); if(gh) gh.noData++; return;}
      if(tier === "high"){high.push(x); if(gh) gh.high++;}
      else if(tier === "med"){med.push(x); if(gh) gh.med++;}
      else {risk.push(x); if(gh) gh.risk++;}
    });
    return {high:high, med:med, risk:risk, awaiting:awaiting, goalHealth:goalHealth};
  }, [items]);

  var health = useMemo(function(){
    var rated = [].concat(buckets.high, buckets.med, buckets.risk);
    var sum = 0; rated.forEach(function(x){sum += x.cap.ciNum;});
    return {
      high: buckets.high.length, med: buckets.med.length, risk: buckets.risk.length,
      noData: buckets.awaiting.length,
      avg: rated.length ? Math.round(sum/rated.length*10)/10 : null,
      total: items.length
    };
  }, [items, buckets]);

  var insights = useMemo(function(){
    var teamCounts = {}, teamTotals = {};
    items.forEach(function(x){
      if(x.cap && x.cap.teams){
        x.cap.teams.forEach(function(t){
          teamTotals[t.name] = (teamTotals[t.name] || 0) + 1;
          if(t.staff === "N") teamCounts[t.name] = (teamCounts[t.name] || 0) + 1;
        });
      }
    });
    var topRisks = buckets.risk.slice()
      .sort(function(a, b){
        var ac = a.cap.ciNum, bc = b.cap.ciNum;
        if(ac !== bc) return ac - bc;
        return (b.cap.noCapacity || 0) - (a.cap.noCapacity || 0);
      }).slice(0, 5);
    var bottlenecks = Object.keys(teamCounts).map(function(name){return {name:name, count:teamCounts[name], total:teamTotals[name] || 0};})
      .sort(function(a, b){return b.count - a.count || a.name.localeCompare(b.name);}).slice(0, 7);
    return {goalHealth: buckets.goalHealth, topRisks: topRisks, bottlenecks: bottlenecks, awaiting: buckets.awaiting};
  }, [items, buckets, health]);

  function compareIds(a, b){
    var ap = String(a).split(".").map(Number);
    var bp = String(b).split(".").map(Number);
    for(var i = 0; i < Math.max(ap.length, bp.length); i++){
      var av = ap[i] || 0, bv = bp[i] || 0;
      if(av !== bv) return av - bv;
    }
    return 0;
  }

  var filtered = useMemo(function(){
    var out = items.filter(function(x){
      if(goalFilter !== "all" && x.init.goal !== goalFilter) return false;
      if(tierFilter !== "all"){var t = capCiTier(x.cap ? x.cap.ciNum : null); if(t !== tierFilter) return false;}
      if(teamFilter.length){
        var teamsOnInit = (x.cap && x.cap.teams) ? x.cap.teams.map(function(t){return t.name;}) : [];
        var hit = teamFilter.some(function(t){return teamsOnInit.indexOf(t) !== -1;});
        if(!hit) return false;
      }
      if(search){var q = search.toLowerCase(); if(!x.init.name.toLowerCase().includes(q) && !x.init.id.includes(q)) return false;}
      return true;
    });
    var col = sortState.col, asc = sortState.dir === "asc";
    out.sort(function(a, b){
      var av, bv;
      if(col === "ci"){av = a.cap ? a.cap.ciNum ?? -1 : -1; bv = b.cap ? b.cap.ciNum ?? -1 : -1; return asc ? av - bv : bv - av;}
      if(col === "id" || col === "name"){return asc ? compareIds(a.init.id, b.init.id) : compareIds(b.init.id, a.init.id);}
      if(col === "goal"){return asc ? a.init.goal.localeCompare(b.init.goal) : b.init.goal.localeCompare(a.init.goal);}
      if(col === "committed"){av = a.cap ? a.cap.committed : 0; bv = b.cap ? b.cap.committed : 0; return asc ? av - bv : bv - av;}
      return 0;
    });
    return out;
  }, [items, goalFilter, tierFilter, teamFilter, search, sortState]);

  function toggleSort(col){
    setSortState(function(p){return {col:col, dir:p.col === col && p.dir === "asc" ? "desc" : "asc"};});
  }

  // Per-team summaries when teams are filtered.
  var teamSummaries = useMemo(function(){
    if(!teamFilter.length) return [];
    return teamFilter.map(function(teamName){
      var entries = [];
      filtered.forEach(function(x){
        if(!x.cap || !x.cap.teams) return;
        var resp = null;
        for(var i = 0; i < x.cap.teams.length; i++){
          if(x.cap.teams[i].name === teamName){resp = x.cap.teams[i]; break;}
        }
        if(!resp) return;
        entries.push({init:x.init, cap:x.cap, response:resp});
      });
      return {teamName:teamName, entries:entries};
    });
  }, [filtered, teamFilter]);

  var drillItem = drill ? items.find(function(x){return x.init.id === drill;}) : null;

  if(data.state.status === "loading"){
    return <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#999",fontSize:13}}>Loading capacity data…</div>;
  }
  if(data.state.status === "error"){
    return (
      <div style={{flex:1,padding:40,color:"#7B241C"}}>
        <div style={{padding:"20px 24px",background:"#FDECEA",border:"1px solid #E6B0AA",borderRadius:8,maxWidth:600,margin:"0 auto"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>Could not load capacity data</div>
          <div style={{fontSize:12,marginBottom:12}}>{data.state.error}</div>
          <button onClick={data.reload} style={{padding:"6px 14px",border:"1px solid #C0392B",background:"#fff",color:"#C0392B",borderRadius:6,cursor:"pointer",fontWeight:600}}>Retry</button>
        </div>
      </div>
    );
  }

  var COLS = [
    {w:4,    th:"",           key:"stripe",    nosort:true},
    {w:54,   th:"Goal",       key:"goal"},
    {w:null, th:"Initiative", key:"name"},
    {w:130,  th:"Status",     key:"status",    nosort:true},
    {w:105,  th:"Confidence", key:"ci",        tip:CAP_CI_METHODOLOGY},
    {w:185,  th:"Capacity",   key:"committed"},
  ];

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* Mismatch banner — structural data quality alert per Project Instructions */}
      {!bannerDismissed && <CapMismatchBanner mismatches={mismatches} onDismiss={function(){setBannerDismissed(true);}}/>}

      {/* Metric strip */}
      <div style={{padding:"12px 24px 8px",background:"#fff",borderBottom:"1px solid #ececec",flexShrink:0}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(118px,1fr))",gap:10}}>
          {[
            {icon:null,  label:"Total",    val:health.total,  sub:"initiatives",col:"#4b6378",k:"all",noFilter:true},
            {icon:"🟢", label:"On Track",  val:health.high,   sub:"CI 8–10",   col:"#1E8449",k:"high"},
            {icon:"🟡", label:"Monitor",   val:health.med,    sub:"CI 6–7",    col:"#B7950B",k:"med"},
            {icon:"🔴", label:"At Risk",   val:health.risk,   sub:"CI ≤ 5",    col:"#C0392B",k:"risk"},
            {icon:"⚪", label:"No Data",   val:health.noData, sub:"awaiting",  col:"#7a8b9a",k:"none"},
          ].map(function(t){
            var active = tierFilter === t.k && !t.noFilter;
            return (
              <div key={t.label}
                onClick={function(){if(!t.noFilter) setTierFilter(tierFilter === t.k ? "all" : t.k);}}
                style={{
                  background:active ? "#F4FAFF" : "#fff",
                  border:"1px solid "+(active ? "#9FC5E8" : "#ececec"),
                  borderRadius:10, padding:"10px 12px",
                  cursor:t.noFilter ? "default" : "pointer",
                  outline:active ? "2px solid rgba(36,113,163,.25)" : "none",
                  transition:"transform .12s,box-shadow .12s",
                }}
                onMouseEnter={function(e){if(!t.noFilter){e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 3px 12px rgba(0,0,0,.06)";}}}
                onMouseLeave={function(e){e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = "";}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:1}}>
                  {t.icon && <span style={{fontSize:13,lineHeight:1,flexShrink:0}}>{t.icon}</span>}
                  <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.06,fontWeight:700,color:t.col,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.label}</div>
                </div>
                <div style={{fontSize:22,fontWeight:800,color:t.col,lineHeight:1.05,marginTop:3}}>{t.val}</div>
                <div style={{fontSize:9.5,opacity:.68,color:t.col,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.sub}</div>
              </div>
            );
          })}
          {health.avg != null && (
            <div title={CAP_CI_METHODOLOGY} style={{background:"#fff",border:"1px solid #ececec",borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.06,fontWeight:700,color:"#607080"}}>Avg CI</div>
              <div style={{fontSize:22,fontWeight:800,lineHeight:1.05,marginTop:3,color:health.avg >= 8 ? "#1E8449" : health.avg >= 6 ? "#B7950B" : "#C0392B"}}>{health.avg}</div>
              <div style={{fontSize:9.5,opacity:.68,color:"#607080",marginTop:2}}>program avg</div>
            </div>
          )}
        </div>
      </div>

      {/* Filter toolbar */}
      <div style={{padding:"10px 24px",background:"#fafafa",borderBottom:"1px solid #ececec",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <span style={{fontSize:10,textTransform:"uppercase",color:"#aaa",fontWeight:700,letterSpacing:.05,marginRight:2}}>Filter</span>
        {[{k:"all",l:"All"},{k:"risk",l:"🔴 At Risk"},{k:"med",l:"🟡 Monitor"},{k:"high",l:"🟢 On Track"},{k:"none",l:"⚪ Awaiting"}].map(function(f){
          var active = tierFilter === f.k;
          return <button key={f.k} onClick={function(){setTierFilter(f.k);}} style={{fontSize:11.5,padding:"5px 11px",border:"1px solid "+(active ? "#2471A3" : "#dcdcdc"),borderRadius:18,background:active ? "#EBF5FB" : "#fff",color:active ? "#2471A3" : "#555",cursor:"pointer",fontWeight:active ? 600 : 500,lineHeight:1.4}}>{f.l}</button>;
        })}
        <select value={goalFilter} onChange={function(e){setGoalFilter(e.target.value);}} style={{fontSize:11.5,padding:"5px 10px",border:"1px solid "+(goalFilter !== "all" ? "#2471A3" : "#dcdcdc"),borderRadius:18,background:goalFilter !== "all" ? "#EBF5FB" : "#fff",color:goalFilter !== "all" ? "#2471A3" : "#555",fontWeight:goalFilter !== "all" ? 600 : 400}}>
          <option value="all">All Goals</option>
          {Object.keys(GOALS).map(function(k){return <option key={k} value={k}>G{GOALS[k].num}: {GOALS[k].short}</option>;})}
        </select>
        <MultiSelect label="Performer" options={CAP_TEAMS} selected={teamFilter} onChange={setTeamFilter}/>
        <CapAwardeeShortcut label="DRC" groupTeams={CAP_TEAMS.filter(function(t){return t.indexOf("DRC") === 0;})} selected={teamFilter} onChange={setTeamFilter}/>
        <CapAwardeeShortcut label="PPSC" groupTeams={CAP_TEAMS.filter(function(t){return t.indexOf("PPSC") === 0;})} selected={teamFilter} onChange={setTeamFilter}/>
        {(search || goalFilter !== "all" || tierFilter !== "all" || teamFilter.length) &&
          <button onClick={function(){setSearch(""); setGoalFilter("all"); setTierFilter("all"); setTeamFilter([]);}}
            style={{fontSize:11.5,background:"none",border:"none",color:"#C0392B",cursor:"pointer",fontWeight:600}}>✕ Clear</button>}
        <div style={{flex:1}}/>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="🔍  Search…" style={{fontSize:12,padding:"5px 11px",border:"1px solid #dcdcdc",borderRadius:18,width:200}}/>
        <span style={{fontSize:11,padding:"3px 9px",borderRadius:20,background:"#fff",border:"1px solid #ececec",color:"#888"}}><strong style={{color:"#333"}}>{filtered.length}</strong> of {health.total}</span>
      </div>

      {/* Workspace */}
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"14px 24px",overflow:"hidden",background:"#f7f8fa",gap:0}}>
        <CapTeamSummariesPanel summaries={teamSummaries} onSelect={function(id){setDrill(id);}} onClearTeams={function(){setTeamFilter([]);}}/>
        <div style={{flex:1,display:"grid",gridTemplateColumns:"minmax(0,2fr) 372px",gap:12,overflow:"hidden",minHeight:0}}>
          <div style={{minWidth:0,overflow:"auto",border:"1px solid #ececec",background:"#fff",borderRadius:10,boxShadow:"0 1px 2px rgba(0,0,0,.03)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,tableLayout:"fixed"}}>
              <colgroup>
                {COLS.map(function(c, i){return <col key={i} style={{width:c.w ? c.w+"px" : "auto"}}/>;})}
              </colgroup>
              <thead>
                <tr>
                  {COLS.map(function(c, i){
                    var isActive = sortState.col === c.key;
                    return (
                      <th key={i} title={c.tip}
                        style={{position:"sticky",top:0,zIndex:2,background:"#1e2a3a",color:"#b8c8d8",fontSize:9.5,fontWeight:600,textTransform:"uppercase",letterSpacing:.55,padding:c.key === "stripe" ? "0" : "7px 8px",whiteSpace:"nowrap",borderRight:i < COLS.length - 1 ? "1px solid #2d3e52" : "none",cursor:c.nosort ? "default" : "pointer",userSelect:"none",overflow:"hidden",textOverflow:"ellipsis"}}
                        onClick={c.nosort ? undefined : function(){toggleSort(c.key);}}>
                        {c.th}{!c.nosort && isActive && <span style={{opacity:.7}}>{sortState.dir === "asc" ? " ↑" : " ↓"}</span>}
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan={COLS.length} style={{textAlign:"center",padding:"40px",color:"#aaa",fontStyle:"italic"}}>No initiatives match the current filters.</td></tr>
                ) : filtered.map(function(x, rowIdx){
                  var g = GOALS[x.init.goal];
                  var cs = capCiStyle(x.cap ? x.cap.ciNum : null);
                  var sd = capStatusDisplay(x.init);
                  return (
                    <tr key={x.init.id} onClick={function(){setDrill(x.init.id);}} style={{cursor:"pointer",background:rowIdx % 2 === 0 ? "#fff" : "#f9fafb"}}
                      onMouseEnter={function(e){e.currentTarget.style.background = "#edf3fb";}}
                      onMouseLeave={function(e){e.currentTarget.style.background = rowIdx % 2 === 0 ? "#fff" : "#f9fafb";}}>
                      <td style={{padding:0,background:g ? goalBorderColor(g) : "#ccc",borderBottom:"1px solid #e4e8ed"}}/>
                      <td style={{padding:"5px 8px",borderBottom:"1px solid #e4e8ed",borderRight:"1px solid #eff1f4"}}><Chip bg={g ? g.color+"22" : "#eee"} tx={g ? goalBorderColor(g) : "#888"}>G{g ? g.num : "?"}</Chip></td>
                      <td title={x.init.name} style={{padding:"5px 8px",borderBottom:"1px solid #e4e8ed",borderRight:"1px solid #eff1f4",maxWidth:0,overflow:"hidden"}}>
                        <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>
                            <span style={{fontSize:12.5,fontWeight:700,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:"1 1 0",minWidth:0}}>{x.init.name}</span>
                          </div>
                          <div style={{fontFamily:"monospace",fontSize:9.5,color:"#aaa",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{x.init.id}{x.init.objOwner ? " · "+x.init.objOwner : ""}</div>
                        </div>
                      </td>
                      <td style={{padding:"5px 8px",borderBottom:"1px solid #e4e8ed",borderRight:"1px solid #eff1f4"}}>{sd ? <Chip bg={sd.bg} tx={sd.tx}>{sd.label}</Chip> : <span style={{color:"#ccc",fontSize:10}}>—</span>}</td>
                      <td style={{padding:"5px 8px",borderBottom:"1px solid #e4e8ed",borderRight:"1px solid #eff1f4"}}>
                        {x.cap && x.cap.ciNum != null ? (
                          <span title={CAP_CI_METHODOLOGY} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:10,whiteSpace:"nowrap",background:cs.bg,color:cs.tx}}>
                            <span style={{width:7,height:7,borderRadius:"50%",background:cs.dot,flexShrink:0}}/>CI {x.cap.ciNum}
                          </span>
                        ) : <span style={{color:"#ccc",fontSize:10,fontStyle:"italic"}}>awaiting</span>}
                      </td>
                      <td style={{padding:"5px 8px",borderBottom:"1px solid #e4e8ed"}}><CapCapacityCell cap={x.cap}/></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{minWidth:0,overflow:"auto"}}>
            <CapInsightPanel insights={insights} health={health}
              onSelect={function(id){setDrill(id);}}
              onGoalClick={function(g){setGoalFilter(goalFilter === g ? "all" : g);}}
              onTierClick={function(t){setTierFilter(tierFilter === t ? "all" : t);}}/>
          </div>
        </div>
      </div>

      {drillItem && <CapDrillPanel item={drillItem} goalsRef={goalsRef} onNavigateView={props.onNavigateView} onClose={function(){setDrill(null);}}/>}

    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   PLACEHOLDER VIEW — used for views not yet ported (Roadmap)
   ════════════════════════════════════════════════════════════════════════════ */

function PlaceholderView(props){
  var data = props.data;
  return (
    <div style={{flex:1,overflow:"auto",padding:"40px 32px",background:"#f7f8fa"}}>
      <div style={{maxWidth:680,margin:"0 auto",background:"#fff",border:"1px solid #ececec",borderRadius:10,padding:"32px",boxShadow:"0 1px 2px rgba(0,0,0,.03)"}}>
        <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1.2,color:"#999",fontWeight:700,marginBottom:8}}>
          Shell · Step 1
        </div>
        <h2 style={{fontSize:22,fontWeight:700,color:"#111",marginBottom:10}}>
          {props.title}
        </h2>
        <p style={{fontSize:13,color:"#555",lineHeight:1.6,marginBottom:18}}>
          This view will be ported in {props.step}. The shell is functioning correctly if you see this message and can switch between tabs.
        </p>

        <div style={{padding:"14px 16px",background:"#fafbfc",border:"1px solid #ececec",borderRadius:8,fontSize:12,color:"#555",marginBottom:14}}>
          <div style={{fontWeight:700,marginBottom:8,color:"#333"}}>Shared data status</div>
          {data.state.status === "loading" && <div style={{color:"#888"}}>↻ Loading CSVs…</div>}
          {data.state.status === "error" && <div style={{color:"#C0392B"}}>⚠ {data.state.error}</div>}
          {data.state.status === "ready" && (
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div>● Loaded at {data.state.loadedAt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</div>
              <div style={{fontSize:11,color:"#888"}}>
                Planning CSV: {data.state.planningCsv.length.toLocaleString()} chars ·
                Goals CSV: {data.state.goalsCsv.length.toLocaleString()} chars ·
                Capacity CSV: {data.state.capacityCsv.length.toLocaleString()} chars
              </div>
            </div>
          )}
        </div>

        {props.selectedInitiativeId && (
          <div style={{padding:"12px 14px",background:"#EBF5FB",border:"1px solid #C8DCF0",borderRadius:8,fontSize:12,color:"#1F618D"}}>
            <div style={{fontWeight:700,marginBottom:4}}>Cross-view navigation working</div>
            <div>You navigated here with initiative <strong style={{fontFamily:"monospace"}}>{props.selectedInitiativeId}</strong> pre-selected. Once this view is ported, its drill-down will open automatically for this initiative.</div>
          </div>
        )}

        <div style={{marginTop:18,fontSize:11,color:"#999",lineHeight:1.5}}>
          <div style={{fontWeight:700,marginBottom:4,color:"#777"}}>What's available in the shell:</div>
          <ul style={{paddingLeft:18}}>
            <li>Shared <code>CYCLE</code>, <code>GOALS</code>, <code>TAXONOMY_REF</code> constants</li>
            <li>Shared helpers: <code>parseCSV</code>, <code>normHeader</code>, <code>makeRowAccessor</code>, <code>goalBorderColor</code>, <code>formatGoalDetail</code>, <code>formatObjectiveDetail</code>, <code>buildPsiUrl</code></li>
            <li>Shared components: <code>AoU</code>, <code>Chip</code>, <code>GoalChipFull</code>, <code>StatusChip</code>, <code>MultiSelect</code>, <code>IdentityBlock</code></li>
            <li>Shared data loader: fetches all three CSVs once, cached in <code>data.state</code></li>
            <li>Cross-view navigation via <code>selectInitiative(id, targetView)</code></li>
          </ul>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   APP SHELL
   Top-level component. Manages active view, selected initiative for cross-view
   navigation, and the shared data loader.
   ════════════════════════════════════════════════════════════════════════════ */

function App(){
  var [activeView, setActiveView] = useState("qpe");        // "qpe" | "roadmap" | "capacity"
  var [selectedInitiativeId, setSelectedInitiativeId] = useState(null);
  var data = useDataLoader();

  // Cross-view navigation: switch tabs and remember which initiative to focus.
  // Views will read selectedInitiativeId from props and auto-open the drill-down.
  var selectInitiative = useCallback(function(targetView, initiativeId){
    setActiveView(targetView);
    setSelectedInitiativeId(initiativeId);
  }, []);

  // When the user manually switches tabs (via tab bar), clear the
  // selected initiative — they're not navigating from a drill-down.
  function handleTabClick(view){
    setActiveView(view);
    setSelectedInitiativeId(null);
  }

  var viewProps = {
    data: data,
    selectedInitiativeId: selectedInitiativeId,
    onNavigateView: selectInitiative,
    currentView: activeView,
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>

      {/* Program header — shown across all views */}
      <div style={{padding:"14px 24px",background:"#fff",borderBottom:"1px solid #ececec",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:12}}>
        <div style={{minWidth:0}}>
          <div style={{fontSize:10.5,textTransform:"uppercase",letterSpacing:1.4,color:"#888",fontWeight:600,marginBottom:4}}>
            NIH · <AoU/> Research Program · {CYCLE.current}
          </div>
          <div style={{fontSize:20,fontWeight:700,color:"#111",lineHeight:1.2,letterSpacing:-0.2}}>
            Program Dashboards
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
          {data.state.status === "ready" && (
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#EAF7EF",color:"#1E8449",fontWeight:600}}>
              ● live · {data.state.loadedAt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
            </span>
          )}
          {data.state.status === "loading" && (
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#EBF5FB",color:"#2471A3",fontWeight:600}}>↻ loading…</span>
          )}
          {data.state.status === "error" && (
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#FDECEA",color:"#C0392B",fontWeight:600}} title={data.state.error}>● load failed</span>
          )}
          <button onClick={data.reload} title="Refresh all data" style={{fontSize:11.5,padding:"6px 12px",border:"1px solid #C8DCF0",borderRadius:6,background:"#EBF5FB",color:"#2471A3",cursor:"pointer",fontWeight:500}}>
            ↻ Refresh
          </button>
        </div>
      </div>

      {/* Tab bar */}
      <div className="tab-bar">
        <button className={"tab"+(activeView==="qpe"?" active":"")} onClick={function(){handleTabClick("qpe");}}>
          Quarterly Planning
        </button>
        <button className={"tab"+(activeView==="roadmap"?" active":"")} onClick={function(){handleTabClick("roadmap");}}>
          Roadmap
        </button>
        <button className={"tab"+(activeView==="capacity"?" active":"")} onClick={function(){handleTabClick("capacity");}}>
          Capacity Planning
        </button>
      </div>

      {/* Active view */}
      {activeView === "qpe"      && <QpeView {...viewProps}/>}
      {activeView === "roadmap"  && <PlaceholderView {...viewProps} title="Program Roadmap" step="Step 4"/>}
      {activeView === "capacity" && <CapacityView {...viewProps}/>}

    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   ERROR BOUNDARY + MOUNT
   ════════════════════════════════════════════════════════════════════════════ */

function ErrorBoundary(props){
  React.Component.call(this, props);
  this.state = {err: null};
}
ErrorBoundary.prototype = Object.create(React.Component.prototype);
ErrorBoundary.prototype.constructor = ErrorBoundary;
ErrorBoundary.prototype.componentDidCatch = function(err){ this.setState({err: err}); };
ErrorBoundary.prototype.render = function(){
  if(this.state.err){
    var self = this;
    return React.createElement("div", {style:{padding:40,fontFamily:"monospace",fontSize:12,color:"#C0392B",background:"#FDECEA",margin:20,borderRadius:8,border:"1px solid #E6B0AA"}},
      React.createElement("div", {style:{fontSize:14,fontWeight:700,marginBottom:10}}, "Something broke rendering this view"),
      React.createElement("div", {style:{marginBottom:10}}, String(this.state.err.message || this.state.err)),
      React.createElement("button", {
        onClick: function(){ self.setState({err: null}); },
        style: {marginTop:12,padding:"6px 14px",border:"1px solid #C0392B",borderRadius:6,background:"#fff",color:"#C0392B",cursor:"pointer",fontWeight:600}
      }, "Reset view")
    );
  }
  return this.props.children;
};

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App, null))
);

</script>
</body>
</html>
