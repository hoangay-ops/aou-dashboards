/* SHARED HELPERS */

/* renderText: defensive wrapper for any value rendered as a React child.
   Prevents React error #31 by stringifying non-primitive values safely. */
function renderText(value, fallback){
  if(fallback === undefined) fallback = "";
  if(value == null) return fallback;
  if(typeof value === "string" || typeof value === "number" || typeof value === "boolean") return String(value);
  if(typeof value === "function" || typeof value === "object") return fallback;
  return String(value);
}

function goalBorderColor(g){
  if(!g) return "#999";
  return g.num === "6" ? "#9A9A9A" : g.color;
}
function taxonomyGoalRef(goalKey){
  var gnum = String(goalKey || "").match(/\d/);
  if(!gnum && GOALS && GOALS[goalKey] && GOALS[goalKey].num) gnum = [GOALS[goalKey].num];
  return gnum ? TAXONOMY_REF[gnum[0]] : null;
}
function taxonomyObjRef(obj){
  var m = String(obj || "").match(/\d+\.\d+/);
  if(!m) return null;
  var gnum = m[0].split(".")[0];
  return TAXONOMY_REF[gnum] && TAXONOMY_REF[gnum].objectives[m[0]] ? TAXONOMY_REF[gnum].objectives[m[0]] : null;
}
function formatGoalDetail(goalKey, fallbackName, fallbackOwner){
  var g = GOALS && GOALS[goalKey] ? GOALS[goalKey] : null;
  var num = g ? g.num : (String(goalKey||"").match(/\d/)||[""])[0];
  var ref = taxonomyGoalRef(goalKey) || taxonomyGoalRef(num);
  var name = (ref && ref.name) || fallbackName || (g && (g.short || g.name)) || "—";
  var owner = (ref && ref.owner) || fallbackOwner || "—";
  return num ? (num + " - " + name + " (Owner: " + owner + ")") : "—";
}
function formatObjectiveDetail(obj, fallbackName, fallbackOwner){
  if(!obj && !fallbackName) return "—";
  var ref = taxonomyObjRef(obj);
  var id = obj || "";
  var name = (ref && ref.name) || fallbackName || "—";
  var owner = (ref && ref.owner) || fallbackOwner || "—";
  return (id ? id + " - " : "") + name + " (Owner: " + owner + ")";
}
function parseCSV(text){
  var rows=[], row=[], cell="", inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i], n=text[i+1];
    if(c==='"'&&inQ&&n==='"'){cell+='"';i++;}
    else if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){row.push(cell);cell="";}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(cell||row.length){row.push(cell);rows.push(row);row=[];cell="";}
      if(c==='\r'&&n==='\n')i++;
    }
    else cell+=c;
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}
function normHeader(h){
  return String(h||"").toLowerCase().replace(/[\r\n]+/g," ").replace(/\s+/g," ").trim();
}
function makeRowAccessor(headerRow){
  var normed = headerRow.map(normHeader);
  return function(row){
    for(var k=1;k<arguments.length;k++){
      var key = normHeader(arguments[k]);
      var idx = normed.indexOf(key);
      if(idx !== -1 && row[idx] != null && String(row[idx]).trim() !== ""){
        return String(row[idx]).trim();
      }
    }
    return "";
  };
}
function addCacheBuster(url){
  return url + (url.indexOf("?") === -1 ? "?" : "&") + "_=" + Date.now();
}

function scrollViewportToTop(){
  try {
    window.scrollTo({top: 0, left: 0, behavior: "auto"});
    if(document.documentElement) document.documentElement.scrollTop = 0;
    if(document.body) document.body.scrollTop = 0;
    var root = document.getElementById("root");
    if(!root) return;
    var nodes = root.querySelectorAll("*");
    for(var i = 0; i < nodes.length; i++){
      var n = nodes[i];
      if(n.closest && n.closest("[data-drilldown-panel]")) continue;
      if(n.scrollHeight <= n.clientHeight) continue;
      var cs = window.getComputedStyle(n);
      var overflowY = cs.overflowY;
      if(overflowY === "auto" || overflowY === "scroll"){
        n.scrollTop = 0;
      }
    }
    setTimeout(function(){
      try { root.scrollIntoView({block: "start", behavior: "smooth"}); } catch(e){}
    }, 0);
  } catch(e){}
}

function buildPsiUrl(init, psiUrlMap){
  if(!init || !init.id) return "";
  if(psiUrlMap && psiUrlMap[init.id]) return psiUrlMap[init.id];
  var idPart = String(init.id).replace(/\./g, "-");
  var namePart = String(init.name || "")
    .toLowerCase()
    .replace(/[^\w\s-]/g, " ")
    .replace(/[\s_]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-+|-+$/g, "");
  var slug = namePart ? (idPart + "-" + namePart) : idPart;
  return "https://sites.google.com/nih.gov/aou-project-status-inventory/psi-home/initiatives/" + slug;
}

function parsePsiUrlMap(csvText){
  if(!csvText) return {};
  var rows = parseCSV(csvText);
  if(!rows.length) return {};
  var hi = 0;
  for(var i = 0; i < Math.min(5, rows.length); i++){
    var n = rows[i].map(normHeader);
    var hasId = n.some(function(h){return h === "id" || h === "initiative id" || h === "init id";});
    var hasUrl = n.some(function(h){return h.indexOf("url") !== -1 || h.indexOf("link") !== -1 || h.indexOf("psi") !== -1;});
    if(hasId && hasUrl){ hi = i; break; }
  }
  var header = rows[hi];
  var body = rows.slice(hi + 1);
  var get = makeRowAccessor(header);
  var map = {};
  body.forEach(function(row){
    var id = get(row, "ID", "Initiative ID", "Init ID");
    var url = get(row, "PSI URL", "URL", "Link", "PSI Link", "PSI URL Link", "Page URL");
    if(id && url) map[String(id).trim()] = String(url).trim();
  });
  return map;
}

function MultiSelect(props){
  var label = props.label, options = props.options, selected = props.selected, onChange = props.onChange;
  var oo = useState(false); var open = oo[0], setOpen = oo[1];
  var ref = useRef(null);
  useEffect(function(){
    function h(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", h);
    return function(){ document.removeEventListener("mousedown", h); };
  },[]);
  var all = selected.length === 0;
  function toggle(k){
    if(selected.indexOf(k) === -1) onChange(selected.concat([k]));
    else onChange(selected.filter(function(x){return x!==k;}));
  }
  return (
    <div ref={ref} style={{position:"relative",display:"inline-block"}}>
      <button onClick={function(){setOpen(!open);}} style={{
        fontSize:11.5,padding:"5px 11px",
        border:"1px solid "+(open||!all?"#2471A3":"#dcdcdc"),
        borderRadius:18,
        background:open||!all?"#EBF5FB":"#fff",
        color:open||!all?"#2471A3":"#555",
        cursor:"pointer",fontWeight:500,whiteSpace:"nowrap"
      }}>
        {all?label:label+" ("+selected.length+")"}
        <span style={{fontSize:8,marginLeft:3,opacity:.6}}>{open?"▲":"▼"}</span>
      </button>
      {open && (
        <div style={{
          position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:600,
          background:"#fff",border:"1px solid #dcdcdc",borderRadius:8,
          boxShadow:"0 6px 18px rgba(0,0,0,.10)",
          minWidth:200,padding:"4px 0",maxHeight:340,overflowY:"auto"
        }}>
          <div onClick={function(){onChange([]);setOpen(false);}} style={{
            fontSize:11.5,padding:"6px 12px",cursor:"pointer",
            color:all?"#2471A3":"#555",fontWeight:all?600:400,
            background:all?"#EBF5FB":"transparent"
          }}>All</div>
          <div style={{height:1,background:"#f0f0f0",margin:"3px 0"}}/>
          {options.map(function(o){
            var on = selected.indexOf(o) !== -1;
            return (
              <div key={o} onClick={function(){toggle(o);}} style={{
                fontSize:11.5,padding:"6px 12px",cursor:"pointer",
                display:"flex",alignItems:"center",gap:8,
                background:on?"#EBF5FB":"transparent",
                color:on?"#2471A3":"#333"
              }}>
                <span style={{
                  width:13,height:13,borderRadius:3,
                  border:"1px solid "+(on?"#2471A3":"#ccc"),
                  background:on?"#2471A3":"#fff",
                  display:"inline-flex",alignItems:"center",justifyContent:"center",
                  fontSize:9,color:"#fff"
                }}>{on?"✓":""}</span>
                {o}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* SHARED DATA LOADER */
function useDataLoader(){
  var [state, setState] = useState({
    status: "loading",
    error: "",
    loadedAt: null,
    planningCsv: "",
    goalsCsv: "",
    capacityCsv: "",
    roadmapCsv: "",
    psiUrlsCsv: "",
  });

  var load = useCallback(function(){
    setState(function(s){return Object.assign({}, s, {status:"loading", error:""});});

    function fetchText(url){
      return fetch(addCacheBuster(url), {cache:"no-store"})
        .then(function(r){
          if(!r.ok) throw new Error("HTTP "+r.status+" from "+url);
          return r.text();
        })
        .then(function(text){
          if(text.toLowerCase().indexOf("<html") > -1){
            throw new Error("Sheet returned HTML instead of CSV — check publication settings");
          }
          return text;
        });
    }

    function fetchRoadmapCsv(){
      return fetchText(ROADMAP_PUBLISHED_CSV)
        .catch(function(){ return fetchText(ROADMAP_EXPORT_CSV); })
        .catch(function(){ return ""; });
    }

    Promise.all([
      fetchText(PLANNING_CSV_URL),
      fetchText(GOALS_CSV_URL),
      fetchText(CAPACITY_CSV_URL).catch(function(){return "";}),
      fetchRoadmapCsv(),
      fetchText(PSI_URLS_CSV).catch(function(){return "";}),
    ])
      .then(function(results){
        setState({
          status: "ready",
          error: "",
          loadedAt: new Date(),
          planningCsv: results[0],
          goalsCsv: results[1],
          capacityCsv: results[2],
          roadmapCsv: results[3],
          psiUrlsCsv: results[4],
        });
      })
      .catch(function(err){
        setState(function(s){return Object.assign({}, s, {
          status: "error",
          error: err.message || String(err)
        });});
      });
  }, []);

  useEffect(function(){ load(); }, [load]);
  return {state: state, reload: load};
}

   QPE VIEW

const QPE_STATUS_KEYS = ["Committed","Proposed","Backlogged","Complete","Eliminated","Concept","Not Funded"];
const QPE_QUARTERS_HIST = [CYCLE.baseline, CYCLE.previous, CYCLE.current];

function qpeParseStatus(raw){
  if(!raw) return null;
  var s = String(raw).trim();
  if(/not\s*funded|unfunded/i.test(s)) return "Not Funded";
  if(/proposed/i.test(s)) return "Proposed";
  if(/committed/i.test(s) && /concept/i.test(s)) return "Concept";
  if(/committed/i.test(s)) return "Committed";
  if(/backlog/i.test(s)) return "Backlogged";
  if(/complete/i.test(s)) return "Complete";
  if(/eliminat/i.test(s)) return "Eliminated";
  if(/concept/i.test(s)) return "Concept";
  return null;
}
function qpeParseRank(v){
  if(!v) return null;
  var s = String(v).trim().toLowerCase();
  if(s === "" || s === "n/a" || s === "na" || s === "-" || s === "none") return null;
  var n = parseInt(s.replace(/[^\d]/g,""), 10);
  return isNaN(n) ? null : n;
}
function qpeFindHeaderRow(rows){
  for(var i=0;i<Math.min(5,rows.length);i++){
    var normed = rows[i].map(normHeader);
    var hasId = normed.indexOf("id") !== -1;
    var hasName = normed.indexOf("initiative name") !== -1 || normed.indexOf("name") !== -1;
    if(hasId && hasName) return i;
  }
  return 0;
}
function qpeNormalizePlanning(csvText){
  if(!csvText) return [];
  var rows = parseCSV(csvText);
  if(rows.length === 0) return [];
  var headerIdx = qpeFindHeaderRow(rows);
  var header = rows[headerIdx];
  var body = rows.slice(headerIdx+1);
  var get = makeRowAccessor(header);
  var inits = [];
  body.forEach(function(row){
    var blank = true;
    for(var i=0;i<row.length;i++){ if(row[i] && String(row[i]).trim()){ blank=false; break; } }
    if(blank) return;
    var id = get(row, "ID");
    var name = get(row, "Initiative Name", "Name");
    if(!id || !name) return;
    var goalRaw = get(row, "5 year Goal", "Goal", "5-year Goal");
    var goalMatch = String(goalRaw).match(/(\d)/);
    var goal = goalMatch ? goalMatch[1] : "";
    if(!GOALS[goal]) return;
    var q3s = get(row, "Q3 2026 Status", "Q3 Status");
    var q2s = get(row, "Q2 2026 Status", "Q2 Status");
    var prev = get(row, "Previous Status (Q4 '25)", "Previous Status", "Q4 2025 Status");
    var q2r = qpeParseRank(get(row, "Q2 '26 Rank", "Q2 2026 Rank"));
    var q3r = qpeParseRank(get(row, "New Q3 '26 Rank", "Q3 '26 Rank", "Q3 2026 Rank"));
    var pt = get(row, "Project Type", "Type");
    var history = [];
    if(prev) history.push({quarter:CYCLE.baseline, status:qpeParseStatus(prev), raw:prev});
    if(q2s)  history.push({quarter:CYCLE.previous, status:qpeParseStatus(q2s),  raw:q2s});
    if(q3s)  history.push({quarter:CYCLE.current,  status:qpeParseStatus(q3s),  raw:q3s});
    inits.push({
      id:id, name:name, goal:goal,
      obj: get(row, "26 Obj", "Objective", "Obj"),
      objName: get(row, "Objective Name", "Obj Name"),
      status: qpeParseStatus(q3s) || qpeParseStatus(q2s) || qpeParseStatus(prev) || qpeParseStatus(pt),
      history: history, q2Rank:q2r, q3Rank:q3r,
      isNew: /^new\b/i.test(pt),
      fullDesc: get(row, "Initiative Full Description", "Full Description", "Description"),
      shortDesc: get(row, "Short Description (for publishing)", "Short Description") ||
                 get(row, "Initiative Full Description", "Full Description", "Description"),
      objOwner: get(row, "Obj Owner", "Objective Owner", "Owner"),
      poc: get(row, "POC or PdM", "POC", "PdM"),
    });
  });
  return inits;
}

function qpeNormalizeGoals(csvText){
  if(!csvText) return {};
  var rows = parseCSV(csvText);
  if(rows.length === 0) return {};
  var headerIdx = 0;
  for(var i=0;i<Math.min(5,rows.length);i++){
    var normed = rows[i].map(normHeader);
    if(normed.some(function(h){return h === "goal" || h === "goal #" || h === "goal number" || h === "g#";})){
      headerIdx = i; break;
    }
  }
  var header = rows[headerIdx];
  var body = rows.slice(headerIdx+1);
  var get = makeRowAccessor(header);
  var map = {};
  var lastGoalNum = null;
  body.forEach(function(row){
    var blank = true;
    for(var i=0;i<row.length;i++){ if(row[i] && String(row[i]).trim()){ blank=false; break; } }
    if(blank) return;
    var goalRaw = get(row, "Goal", "Goal #", "Goal Number", "G#", "5 year Goal");
    var goalMatch = String(goalRaw).match(/(\d)/);
    var goalNum = goalMatch ? goalMatch[1] : "";
    if(!goalNum && lastGoalNum) goalNum = lastGoalNum;
    if(!goalNum) return;
    lastGoalNum = goalNum;
    var goalName = get(row, "Goal Name", "Goal Title");
    var goalDesc = get(row, "Goal Description", "Goal Desc", "Description");
    var goalOwner = get(row, "Goal Owner", "Goal Owner Name");
    if(!map[goalNum]){
      map[goalNum] = {num:goalNum, name:goalName, desc:goalDesc, owner:goalOwner, objectives:[]};
    } else {
      if(goalName && !map[goalNum].name) map[goalNum].name = goalName;
      if(goalDesc && !map[goalNum].desc) map[goalNum].desc = goalDesc;
      if(goalOwner && !map[goalNum].owner) map[goalNum].owner = goalOwner;
    }
    var obj = get(row, "Objective", "Obj", "Objective #", "Obj #");
    var objName = get(row, "Objective Name", "Obj Name");
    var objDesc = get(row, "Objective Description", "Obj Description", "Obj Desc");
    var objOwner = get(row, "Objective Owner", "Obj Owner", "Owner");
    if(obj){
      var existing = map[goalNum].objectives.find(function(o){return o.obj === obj;});
      if(existing){
        if(objOwner && existing.owners.indexOf(objOwner) === -1) existing.owners.push(objOwner);
        if(objDesc && !existing.desc) existing.desc = objDesc;
        if(objName && !existing.name) existing.name = objName;
      } else {
        map[goalNum].objectives.push({obj:obj, name:objName, desc:objDesc, owners: objOwner ? [objOwner] : []});
      }
    }
  });
  return map;
}

function qpeNormalizeCapacity(csvText){
  if(!csvText) return {};
  var rows = parseCSV(csvText);
  if(rows.length === 0) return {};
  var headerIdx = 0;
  for(var i=0;i<Math.min(6,rows.length);i++){
    if(rows[i][0] && normHeader(rows[i][0]) === "id"){ headerIdx = i; break; }
  }
  var header = rows[headerIdx];
  var body = rows.slice(headerIdx+1);
  var get = makeRowAccessor(header);
  var map = {};
  body.forEach(function(row){
    var id = get(row, "ID");
    if(!id || !/^\d+\.\d+/.test(id)) return;
    var cfRaw = get(row, "Confidence Factor");
    var cf = cfRaw.indexOf("%") !== -1 ? parseFloat(cfRaw)/100 : (parseFloat(cfRaw)||0);
    if(isNaN(cf)) cf = 0;
    var ciLabel = String(row[2]||"").trim();
    var ciMatch = ciLabel.match(/(\d+)/);
    function int(key){ return parseInt(get(row, key)) || 0; }
    map[id] = {
      confidenceFactor: cf, confidenceLabel: ciLabel,
      ciNum: ciMatch ? parseInt(ciMatch[1],10) : null,
      performers: int("Performers"), committed: int("Committed"),
      possiblyXS: int("Possibly - XS"), possiblyS: int("Possibly - S"),
      possiblyM: int("Possibly - M"), possiblyL: int("Possibly - L"),
      possiblyXL: int("Possibly - XL"),
      noCapacity: int("No Capacity Remaining"),
      notPerforming: int("Not Performing"),
    };
  });
  return map;
}

function qpeCiColor(n){
  if(n == null) return "#999";
  if(n >= 8) return "#1E8449";
  if(n >= 6) return "#B7950B";
  return "#C0392B";
}

function QpeGoalPanel(props){
  var gk = props.goalKey;
  var allInits = props.allInitiatives;
  var goalsRef = props.goalsRef || {};
  if(!gk) return null;
  var g = GOALS[gk];
  if(!g) return null;
  var ref = goalsRef[gk] || {};
  var goalInits = allInits.filter(function(i){return i.goal === gk;});
  var observedObjMap = {};
  goalInits.forEach(function(i){
    if(!i.obj) return;
    if(!observedObjMap[i.obj]){
      observedObjMap[i.obj] = {obj:i.obj, name:i.objName, ownersFromInits:{}, initCount:0};
    }
    observedObjMap[i.obj].initCount++;
    if(i.objOwner) observedObjMap[i.obj].ownersFromInits[i.objOwner] = true;
  });
  var refObjMap = {};
  (ref.objectives || []).forEach(function(o){ refObjMap[o.obj] = o; });
  var allObjKeys = {};
  Object.keys(refObjMap).forEach(function(k){ allObjKeys[k] = true; });
  Object.keys(observedObjMap).forEach(function(k){ allObjKeys[k] = true; });
  var objectives = Object.keys(allObjKeys).sort(function(a,b){
    var aParts = a.split(".").map(Number);
    var bParts = b.split(".").map(Number);
    for(var i = 0; i < Math.max(aParts.length, bParts.length); i++){
      var av = aParts[i] || 0, bv = bParts[i] || 0;
      if(av !== bv) return av - bv;
    }
    return 0;
  }).map(function(k){
    var obs = observedObjMap[k];
    var rf = refObjMap[k];
    var owners = {};
    if(rf && rf.owners) rf.owners.forEach(function(o){ owners[o] = true; });
    if(obs) Object.keys(obs.ownersFromInits).forEach(function(o){ owners[o] = true; });
    return {
      obj: k,
      name: (rf && rf.name) || (obs && obs.name) || "",
      desc: rf ? rf.desc : "",
      owners: Object.keys(owners),
      initCount: obs ? obs.initCount : 0,
      hasReference: !!rf,
    };
  });

  return (
    <div data-drilldown-panel="qpe-goal" style={{position:"fixed",top:0,right:0,bottom:0,width:"440px",maxWidth:"42vw",background:"#fff",borderLeft:"1px solid #ececec",boxShadow:"-4px 0 16px rgba(0,0,0,.08)",zIndex:1000,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px",borderBottom:"1px solid #ececec",background:"#fafbfc",flexShrink:0,borderTop:"4px solid "+goalBorderColor(g)}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:goalBorderColor(g),fontWeight:700,marginBottom:4}}>Strategic Goal {g.num}</div>
            <div style={{fontSize:17,fontWeight:700,lineHeight:1.25,color:"#111"}}>{ref.name || g.name}</div>
          </div>
          <button onClick={props.onClose} style={{border:"none",background:"none",fontSize:22,color:"#bbb",cursor:"pointer",padding:0,lineHeight:1}}>×</button>
        </div>
        <div style={{fontSize:11,color:"#888",marginTop:6}}>{goalInits.length} initiative{goalInits.length !== 1 ? "s" : ""} in this quarter · {objectives.length} objective{objectives.length !== 1 ? "s" : ""}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 20px"}}>
        <div style={{marginBottom:14,padding:"10px 12px",borderRadius:6,background:"#fff",border:"1px solid #ececec"}}>
          <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600,marginBottom:6}}>Goal description</div>
          {ref.desc ? <div style={{fontSize:12,color:"#444",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{ref.desc}</div> : <div style={{fontSize:11.5,color:"#bbb",fontStyle:"italic"}}>Not provided in Goals reference sheet.</div>}
        </div>
        <div style={{marginBottom:14,padding:"10px 12px",borderRadius:6,background:"#fff",border:"1px solid #ececec"}}>
          <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600,marginBottom:6}}>Goal Owner</div>
          {ref.owner ? <div style={{fontSize:12,color:"#444",fontWeight:500}}>{ref.owner}</div> : <div style={{fontSize:11.5,color:"#bbb",fontStyle:"italic"}}>Not provided in Goals reference sheet.</div>}
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600,marginBottom:8}}>Objectives & owners</div>
          {objectives.length === 0 ? <div style={{fontSize:11.5,color:"#bbb",fontStyle:"italic",padding:"8px 12px"}}>No objectives found.</div> : objectives.map(function(o){
            return (
              <div key={o.obj} style={{padding:"10px 12px",marginBottom:6,borderRadius:6,background:"#fff",border:"1px solid #ececec",borderLeft:"3px solid "+goalBorderColor(g)}}>
                <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:8,marginBottom:4}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#222"}}>Objective {o.obj}{o.name ? ": "+o.name : ""}</div>
                  <div style={{fontSize:10,color:o.initCount > 0 ? "#999" : "#ccc",flexShrink:0}}>{o.initCount} init</div>
                </div>
                {o.desc && <div style={{fontSize:11,color:"#666",marginTop:4,marginBottom:6,lineHeight:1.45}}>{o.desc}</div>}
                <div style={{fontSize:10.5,color:"#666"}}>
                  <span style={{color:"#aaa"}}>Owner{o.owners.length !== 1 ? "s" : ""}: </span>
                  {o.owners.length > 0 ? o.owners.join(", ") : <span style={{color:"#bbb",fontStyle:"italic"}}>none assigned</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  var list = props.list;
  return (
    <div data-drilldown-panel="qpe-list" style={{position:"fixed",top:0,right:0,bottom:0,width:"440px",maxWidth:"42vw",background:"#fff",borderLeft:"1px solid #ececec",boxShadow:"-4px 0 16px rgba(0,0,0,.08)",zIndex:1000,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px",borderBottom:"1px solid #ececec",background:"#fafbfc",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:props.accent || "#999",fontWeight:700,marginBottom:4}}>{props.label}</div>
            <div style={{fontSize:17,fontWeight:700,lineHeight:1.25,color:"#111"}}>{list.items.length} {list.items.length === 1 ? "initiative" : "initiatives"}</div>
            {props.sublabel && <div style={{fontSize:11,color:"#888",marginTop:4}}>{props.sublabel}</div>}
          </div>
          <button onClick={props.onClose} style={{border:"none",background:"none",fontSize:22,color:"#bbb",cursor:"pointer",padding:0,lineHeight:1}}>×</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
        {list.items.length === 0 ? <div style={{padding:"30px",textAlign:"center",color:"#bbb",fontSize:12,fontStyle:"italic"}}>No initiatives in this bucket.</div> : (function(){
          var byGoal = {};
          list.items.forEach(function(i){
            if(!byGoal[i.goal]) byGoal[i.goal] = [];
            byGoal[i.goal].push(i);
          });
          var goalKeys = Object.keys(byGoal).sort();
          return goalKeys.map(function(gk){
            var g = GOALS[gk];
            var items = byGoal[gk];
            return (
              <div key={gk} style={{marginBottom:14}}>
                <div style={{fontSize:10.5,fontWeight:700,color:goalBorderColor(g),marginBottom:6,textTransform:"uppercase",letterSpacing:.4,padding:"2px 4px"}}>
                  Goal {g.num}: {g.name} <span style={{color:"#aaa",fontWeight:400,marginLeft:4}}>({items.length})</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {items.map(function(i){
                    var sc = STATUS_CFG[i.status];
                    return (
                      <div key={i.id} onClick={function(){props.onItemDrill(i.id);}} style={{padding:"7px 10px",borderRadius:5,background:"#fff",border:"1px solid #ececec",cursor:"pointer",display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:sc?sc.dot:"#ccc",flexShrink:0}}/>
                        <span style={{fontFamily:"monospace",fontSize:10,color:"#aaa",flexShrink:0}}>{i.id}</span>
                        <span style={{fontSize:11.5,color:"#333",flex:1,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={i.name}>{i.name}</span>
                        {i.isNew && <Chip bg="#FEF5E7" tx="#9A6800" size={8.5}>NEW</Chip>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          });
        })()}
      </div>
    </div>
  );
}

function QpeInitCard(props){
  var i = props.init;
  var g = GOALS[i.goal];
  return (
    <div onClick={function(){props.onDrill(i.id);}} style={{padding:"10px 12px",borderRadius:8,background:"#fff",border:"1px solid #ececec",cursor:"pointer",display:"flex",flexDirection:"column",gap:6,minWidth:0,transition:"transform .12s,box-shadow .12s"}}
      onMouseEnter={function(e){e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 3px 12px rgba(0,0,0,.07)";}}
      onMouseLeave={function(e){e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
      <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0,flexWrap:"wrap"}}>
        <Chip bg={g.color+"22"} tx={goalBorderColor(g)} size={9.5}>G{g.num}</Chip>
        <span style={{fontFamily:"monospace",fontSize:9.5,color:"#aaa"}}>{i.id}</span>

function QpeMainView(props){
  var initiatives = props.initiatives, onDrill = props.onDrill, onGoalDrill = props.onGoalDrill, goalFocus = props.goalFocus;
  var goalsRef = props.goalsRef || {};
  var newOnes = initiatives.filter(function(i){return i.isNew;});

  var cycleStory = useMemo(function(){
    var lastCommittedIds = {}, lastBackloggedIds = {};
    initiatives.forEach(function(i){
      var q2H = i.history.find(function(h){return h.quarter === CYCLE.previous;});
      if(q2H && q2H.status === "Committed") lastCommittedIds[i.id] = true;
      if(q2H && q2H.status === "Backlogged") lastBackloggedIds[i.id] = true;
    });
    var lastCommitted = Object.keys(lastCommittedIds);
    var completed = initiatives.filter(function(i){return lastCommittedIds[i.id] && i.status === "Complete";});
    var backlogged = initiatives.filter(function(i){return lastCommittedIds[i.id] && i.status === "Backlogged";});
    var ongoing = initiatives.filter(function(i){return lastCommittedIds[i.id] && (i.status === "Proposed" || i.status === "Committed") && !i.isNew;});
    var newProposed = initiatives.filter(function(i){
      if(!i.isNew) return false;
      if(i.status !== "Proposed") return false;
      var hadPriorHistory = i.history.some(function(h){return h.quarter !== CYCLE.current && h.status;});
      return !hadPriorHistory;
    });
    var revived = initiatives.filter(function(i){return lastBackloggedIds[i.id] && (i.status === "Proposed" || i.status === "Committed");});
    return {lastCommittedTotal: lastCommitted.length, completed:completed, backlogged:backlogged, ongoing:ongoing, newProposed:newProposed, revived:revived};
  },[initiatives]);

  var goalLanes = {};
  Object.keys(GOALS).forEach(function(k){ goalLanes[k] = []; });
  initiatives.forEach(function(i){ if(goalLanes[i.goal]) goalLanes[i.goal].push(i); });
  function compareIds(a, b){
    var ap = String(a.id || "").split(".").map(Number);
    var bp = String(b.id || "").split(".").map(Number);
    for(var i = 0; i < Math.max(ap.length, bp.length); i++){
      var av = ap[i] || 0, bv = bp[i] || 0;
      if(av !== bv) return av - bv;
    }
    return 0;
  }
  Object.keys(goalLanes).forEach(function(k){ goalLanes[k].sort(function(a, b){ return compareIds(a, b); }); });

  return (
    <div style={{padding:"20px 28px 32px"}}>
      <section style={{marginBottom:24}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"stretch"}}>
          <div style={{display:"flex",gap:8,flex:"1 1 320px",minWidth:280}}>
            <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:4,flex:"0 1 160px",background:"#fafbfc",border:"1px solid #ececec",borderRadius:10}}>
              <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600,display:"flex",alignItems:"center"}}>
                <span style={{fontSize:14,fontWeight:600,lineHeight:1,marginRight:4,color:"#999"}}>←</span>Outcomes from last cycle
              </div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <div><div style={{fontSize:9.5,color:"#999"}}>Completed</div><div style={{fontSize:16,fontWeight:700,color:"#1E8449",lineHeight:1.1}}>{cycleStory.completed.length}</div></div>
                <div><div style={{fontSize:9.5,color:"#999"}}>Backlogged</div><div style={{fontSize:16,fontWeight:700,color:STATUS_CFG.Backlogged.tx,lineHeight:1.1}}>{cycleStory.backlogged.length}</div></div>
              </div>
              <div style={{fontSize:9.5,color:"#aaa",marginTop:"auto",paddingTop:4}}>of {cycleStory.lastCommittedTotal} committed</div>
            </div>
            <div style={{padding:"10px 14px 12px",display:"flex",flexDirection:"column",gap:6,flex:"1 1 200px",background:"#fff",border:"1px solid #ececec",borderRadius:10}}>
              <div onClick={function(){props.onListDrill({label:"In "+CYCLE.current+" planning",items:cycleStory.ongoing.concat(cycleStory.newProposed).concat(cycleStory.revived),sublabel:cycleStory.ongoing.length+" ongoing + "+cycleStory.newProposed.length+" new"+(cycleStory.revived.length?" + "+cycleStory.revived.length+" revived":""),accent:"#666"});}} style={{cursor:"pointer",margin:"-4px -6px",padding:"4px 6px",borderRadius:5}}>
                <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#2471A3",fontWeight:600,display:"flex",alignItems:"center"}}>
                  <span style={{fontSize:14,fontWeight:600,lineHeight:1,marginRight:4,color:"#2471A3"}}>→</span>Candidates for this cycle
                </div>
                <div style={{fontSize:24,fontWeight:700,lineHeight:1.1,marginTop:2,color:"#111"}}>{cycleStory.ongoing.length + cycleStory.newProposed.length + cycleStory.revived.length}</div>
                <div style={{fontSize:10,color:"#666",marginTop:1}}>{cycleStory.ongoing.length} ongoing + {cycleStory.newProposed.length} new{cycleStory.revived.length?" + "+cycleStory.revived.length+" revived":""}</div>
              </div>
              <div style={{marginTop:2}}>
                <div style={{display:"flex",height:16,borderRadius:3,overflow:"hidden",border:"1px solid #ececec"}}>
                  {[{k:"Ongoing",n:cycleStory.ongoing.length,color:STATUS_CFG.Proposed.dot},{k:"New",n:cycleStory.newProposed.length,color:"#F4D03F"},{k:"Revived",n:cycleStory.revived.length,color:"#6C3483"}].map(function(seg){
                    if(seg.n === 0) return null;
                    return <div key={seg.k} style={{flexGrow:seg.n,background:seg.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9.5,color:"#fff",fontWeight:600}}>{seg.n}</div>;
                  })}
                </div>
                <div style={{display:"flex",gap:8,marginTop:4,fontSize:9.5,color:"#666",flexWrap:"wrap"}}>
                  {[{k:"Ongoing",n:cycleStory.ongoing.length,color:STATUS_CFG.Proposed.dot},{k:"New",n:cycleStory.newProposed.length,color:"#F4D03F"},{k:"Revived",n:cycleStory.revived.length,color:"#6C3483"}].map(function(seg){
                    if(seg.n === 0) return null;
                    return <span key={seg.k} style={{display:"inline-flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:2,background:seg.color}}/>{seg.k}</span>;
                  })}
                </div>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flex:"2 1 540px",flexWrap:"wrap",alignItems:"stretch"}}>
            {[
              {label:"✓ Completed",     items:cycleStory.completed,  sublabel:"of "+cycleStory.lastCommittedTotal+" committed last cycle", accent:"#117A65", count:cycleStory.completed.length,  color:"#117A65", bg:"#fafbfc", suffix:"last cycle"},
              {label:"↓ Backlogged",    items:cycleStory.backlogged, sublabel:"of "+cycleStory.lastCommittedTotal+" committed last cycle", accent:"#7D6608", count:cycleStory.backlogged.length, color:"#7D6608", bg:"#fafbfc", suffix:"last cycle"},
            ].map(function(t){
              return (
                <div key={t.label} onClick={function(){props.onListDrill({label:t.label,items:t.items,sublabel:t.sublabel,accent:t.accent});}} style={{padding:"8px 12px",flex:"1 1 110px",display:"flex",flexDirection:"column",gap:1,justifyContent:"center",cursor:"pointer",background:t.bg,border:"1px solid #ececec",borderRadius:10}}>
                  <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:"#999",fontWeight:600}}>{t.label}</div>
                  <div style={{fontSize:18,fontWeight:700,color:t.color,lineHeight:1.1}}>{t.count}</div>
                  <div style={{fontSize:9.5,color:"#aaa"}}>{t.suffix}</div>
                </div>
              );
            })}
            <div style={{width:1,background:"#ddd",margin:"4px 4px",flexShrink:0}}/>
            {[
              {label:"↻ Ongoing",       items:cycleStory.ongoing,    sublabel:"carried forward from last cycle", accent:"#7D6608", count:cycleStory.ongoing.length,    color:"#7D6608", bg:"#fff",     bdr:"#ececec", suffix:"this cycle"},
              {label:"+ New Proposed",  items:cycleStory.newProposed,sublabel:"added this cycle",                accent:"#9A6800", count:cycleStory.newProposed.length,color:"#9A6800", bg:"#FEF5E7",  bdr:"#F4D03F", suffix:"this cycle"},
              {label:"↻ Revived",       items:cycleStory.revived,    sublabel:"pulled back to active",           accent:"#6C3483", count:cycleStory.revived.length,    color:"#6C3483", bg:"#fff",     bdr:"#ececec", suffix:"this cycle"},
            ].map(function(t){
              return (
                <div key={t.label} onClick={function(){props.onListDrill({label:t.label,items:t.items,sublabel:t.sublabel,accent:t.accent});}} style={{padding:"8px 12px",flex:"1 1 110px",display:"flex",flexDirection:"column",gap:1,justifyContent:"center",cursor:"pointer",background:t.bg,border:"1px solid "+t.bdr,borderRadius:10}}>
                  <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:t.bg==="#FEF5E7"?"#9A6800":"#999",fontWeight:600}}>{t.label}</div>
                  <div style={{fontSize:18,fontWeight:700,color:t.color,lineHeight:1.1}}>{t.count}</div>
                  <div style={{fontSize:9.5,color:t.bg==="#FEF5E7"?"#9A6800":"#aaa"}}>{t.suffix}</div>
                </div>
              );
            })}
          </div>
        </div>
      </section>

      {newOnes.length > 0 && (
        <section style={{marginBottom:24}}>
          <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:.8,color:"#9A6800",fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
            <span>📥 New Proposed Initiatives This Cycle</span>
            <span style={{flex:1,height:1,background:"#F4D03F"}}/>
            <span style={{fontSize:10,color:"#aaa",letterSpacing:0,fontWeight:400,textTransform:"none"}}>({newOnes.length})</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(320px, 1fr))",gap:10}}>
            {newOnes.map(function(n){return <QpeInitCard key={n.id} init={n} onDrill={onDrill}/>;})}
          </div>
        </section>
      )}

      <section style={{marginBottom:24}}>
        <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:.8,color:"#666",fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
          <span>Initiatives by Goal — {CYCLE.current}</span>
          <span style={{flex:1,height:1,background:"#ddd"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3, minmax(0, 1fr))",gap:12}}>
          {Object.keys(GOALS).filter(function(k){return goalFocus === "all" || goalFocus === k;}).map(function(k){
            var g = GOALS[k];
            var lane = Array.isArray(goalLanes[k]) ? goalLanes[k] : [];
            var goalOwner = goalsRef[k] && goalsRef[k].owner;
            return (
              <div key={k} style={{padding:"12px 14px",background:"#fff",border:"1px solid #ececec",borderRadius:10}}>
                <div onClick={function(){onGoalDrill(k);}} style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8,gap:6,borderBottom:"2px solid "+goalBorderColor(g)+"55",paddingBottom:6,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:8,minWidth:0,flex:1}}>
                    <span style={{fontSize:13,fontWeight:700,color:goalBorderColor(g),whiteSpace:"nowrap"}}>
                      Goal {renderText(g && g.num)}: {renderText(g && g.short)}
                    </span>
                    {goalOwner && (
                      <span style={{fontSize:10.5,color:"#999",fontWeight:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        · {renderText(goalOwner)}
                      </span>
                    )}
                  </div>
                  <span style={{fontSize:10.5,color:"#999",flexShrink:0}}>{lane.length}</span>
                </div>
                {lane.length === 0 ? <div style={{fontSize:11,color:"#bbb",fontStyle:"italic",padding:"6px 0"}}>None in this quarter.</div> : (
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    {lane.map(function(i){
                      return (
                        <div key={i.id} onClick={function(){onDrill(i.id);}} style={{padding:"6px 8px",margin:"0 -8px",borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",gap:6,minWidth:0,transition:"background .12s"}}
                          onMouseEnter={function(e){e.currentTarget.style.background="#f7fafd";}}
                          onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>
                          <span
                            style={{fontSize:12,color:"#333",flex:1,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}
                            title={renderText(i.name)}>
                            {renderText(i.name)}
                            {" "}
                            <span style={{fontFamily:"monospace",fontSize:9.5,color:"#aaa",fontWeight:400}}>
                              {renderText(i.id)}
                            </span>
                          </span>
                          {i.isNew && <Chip bg="#FEF5E7" tx="#9A6800" size={8.5}>NEW</Chip>}
                          {i.status === "Backlogged" && <Chip bg={STATUS_CFG.Backlogged.bg} tx={STATUS_CFG.Backlogged.tx} size={8.5}>Backlogged</Chip>}
                          {i.status === "Complete" && <Chip bg={STATUS_CFG.Complete.bg} tx={STATUS_CFG.Complete.tx} size={8.5}>Completed</Chip>}
                          {i.status === "Not Funded" && <Chip bg={STATUS_CFG["Not Funded"].bg} tx={STATUS_CFG["Not Funded"].tx} size={8.5}>Not Funded</Chip>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </section>
    </div>
  );
}

function QpeView(props){
  var data = props.data;
  var [goalFocus, setGoalFocus] = useState("all");
  var [fStatus, setFStatus] = useState([]);
  var [newOnly, setNewOnly] = useState(false);
  var [search, setSearch] = useState("");
  var [drillRaw, setDrillRaw] = useState(null);
  var [goalDrillRaw, setGoalDrillRaw] = useState(null);
  var [listDrillRaw, setListDrillRaw] = useState(null);
  var [guideOpen, setGuideOpen] = useState(false);

  function setDrill(v){ setDrillRaw(v); if(v) scrollViewportToTop(); }
  function setGoalDrill(v){ setGoalDrillRaw(v); if(v) scrollViewportToTop(); }
  function setListDrill(v){ setListDrillRaw(v); if(v) scrollViewportToTop(); }
  var drill = drillRaw, goalDrill = goalDrillRaw, listDrill = listDrillRaw;

  var initiatives = useMemo(function(){
    if(data.state.status !== "ready") return [];
    return qpeNormalizePlanning(data.state.planningCsv);
  }, [data.state.status, data.state.planningCsv]);

  var goalsRef = useMemo(function(){
    if(data.state.status !== "ready") return {};
    return qpeNormalizeGoals(data.state.goalsCsv);
  }, [data.state.status, data.state.goalsCsv]);

  var capRef = useMemo(function(){
    if(data.state.status !== "ready") return {};
    return qpeNormalizeCapacity(data.state.capacityCsv);
  }, [data.state.status, data.state.capacityCsv]);

  useEffect(function(){
    if(props.selectedInitiativeId && initiatives.length > 0){
      var match = initiatives.find(function(i){return i.id === props.selectedInitiativeId;});
      if(match) setDrill(match.id);
    }
  }, [props.selectedInitiativeId, initiatives]);

  var filtered = useMemo(function(){
    return initiatives.filter(function(i){
      if(goalFocus !== "all" && i.goal !== goalFocus) return false;
      if(fStatus.length > 0 && fStatus.indexOf(i.status) === -1) return false;
      if(newOnly && !i.isNew) return false;
      if(search){
        var q = search.toLowerCase();
        if(i.name.toLowerCase().indexOf(q) === -1 && i.id.toLowerCase().indexOf(q) === -1 && (i.objOwner||"").toLowerCase().indexOf(q) === -1) return false;
      }
      return true;
    });
  },[initiatives, goalFocus, fStatus, newOnly, search]);

  var availableStatuses = useMemo(function(){
    return QPE_STATUS_KEYS.filter(function(s){return initiatives.some(function(i){return i.status === s;});});
  },[initiatives]);

  var drillInit = drill ? initiatives.find(function(x){return x.id === drill;}) : null;
  var anyFilter = goalFocus !== "all" || fStatus.length > 0 || newOnly || (search !== "" && search !== null);
  function clearAll(){ setGoalFocus("all"); setFStatus([]); setNewOnly(false); setSearch(""); }

  if(data.state.status === "loading"){
    return <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#999",fontSize:13}}>Loading planning data…</div>;
  }
  if(data.state.status === "error"){
    return (
      <div style={{flex:1,padding:40,color:"#7B241C"}}>
        <div style={{padding:"20px 24px",background:"#FDECEA",border:"1px solid #E6B0AA",borderRadius:8,maxWidth:600,margin:"0 auto"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>Could not load planning data</div>
          <div style={{fontSize:12,marginBottom:12}}>{data.state.error}</div>
          <button onClick={data.reload} style={{padding:"6px 14px",border:"1px solid #C0392B",background:"#fff",color:"#C0392B",borderRadius:6,cursor:"pointer",fontWeight:600}}>Retry</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 24px",background:"#fff",borderBottom:"1px solid #ececec",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <span style={{fontSize:10,textTransform:"uppercase",color:"#aaa",fontWeight:700,letterSpacing:.05,marginRight:2}}>Focus</span>
        <select value={goalFocus} onChange={function(e){setGoalFocus(e.target.value);}} style={{fontSize:11.5,padding:"5px 10px",border:"1px solid "+(goalFocus !== "all" ? "#2471A3" : "#dcdcdc"),borderRadius:18,background:goalFocus !== "all" ? "#EBF5FB" : "#fff",color:goalFocus !== "all" ? "#2471A3" : "#555",fontWeight:goalFocus !== "all" ? 600 : 400}}>
          <option value="all">All Goals</option>
          {Object.keys(GOALS).map(function(k){var g = GOALS[k]; return <option key={k} value={k}>Goal {g.num}: {g.name}</option>;})}
        </select>
        <MultiSelect label="Status" options={availableStatuses} selected={fStatus} onChange={setFStatus}/>
        <button onClick={function(){setNewOnly(!newOnly);}} title="Show only initiatives flagged NEW in the planning sheet" style={{fontSize:11.5,padding:"5px 11px",border:"1px solid "+(newOnly ? "#9A6800" : "#dcdcdc"),borderRadius:18,background:newOnly ? "#FEF5E7" : "#fff",color:newOnly ? "#9A6800" : "#555",cursor:"pointer",fontWeight:newOnly ? 600 : 400}}>📥 New only</button>
        {anyFilter && <button onClick={clearAll} style={{fontSize:11.5,background:"none",border:"none",color:"#C0392B",cursor:"pointer",fontWeight:500}}>✕ Clear</button>}

/* ════════════════════════════════════════════════════════════════════════════
   CAPACITY VIEW
   ════════════════════════════════════════════════════════════════════════════ */

const CAP_TEAMS = [
  "Chief of Staff","COO","DCD","DMSR","DMSR (ODA)","Engagement","OFM",
  "Policy","Product","TPC","UX","DTPD","BioBank",
  "DRC: Analytics","DRC: Curation","DRC: RDR","DRC: HealthPro","DRC: Public","DRC: Workbench",
  "PPSC: NORC","PPSC: IBM","PPSC: Support Center"
];
const CAP_TEAM_COL_START = 13;

const CAP_LOE_LABEL = {"1":"XS","2":"S","3":"M","5":"L","8":"XL","13":"XXL","21":"XXXL"};
const CAP_STAFF_CFG = {
  "D":{label:"Definitely",  color:"#1E8449",bg:"#eafaf1"},
  "P":{label:"Possibly",    color:"#B7950B",bg:"#fefaec"},
  "N":{label:"No Capacity", color:"#C0392B",bg:"#fdf2f2"},
};

const CAP_CI_METHODOLOGY = "Confidence Index = weighted sum ÷ performers. Definitely +1.0, Possibly XS/S +0.8, Possibly M 0, Possibly L/XL −0.5, No Capacity −1.0. Thresholds: 8–10 on track, 6–7 monitor, ≤5 at risk.";

function capCiTier(n){if(n==null)return"none";if(n>=8)return"high";if(n>=6)return"med";return"risk";}
function capCiStyle(n){
  var t=capCiTier(n);
  if(t==="high")return{bg:"#eafaf1",tx:"#1a6b3a",dot:"#1E8449"};
  if(t==="med") return{bg:"#fefaec",tx:"#7D6008",dot:"#F1C40F"};
  if(t==="risk")return{bg:"#fdf2f2",tx:"#922b21",dot:"#C0392B"};
  return{bg:"#f4f4f4",tx:"#888",dot:"#ccc"};
}
function capStatusDisplay(init){
  if(!init || !init.status) return null;
  var s = init.status;
  if(s === "Proposed"){
    if(init.isNew) return {label:"Proposed (New)", bg:"#FEF5E7", tx:"#9A6800"};
    return {label:"Proposed (Ongoing)", bg:"#FCF3CF", tx:"#7D6608"};
  }
  var cfg = STATUS_CFG[s];
  if(!cfg) return null;
  return {label:s, bg:cfg.bg, tx:cfg.tx};
}
function capParseStatus(r){
  if(!r) return null;
  var s = String(r);
  if(/concept/i.test(s) && /committed/i.test(s)) return "Concept";
  if(/not\s*funded|unfunded/i.test(s)) return "Not Funded";
  if(/proposed/i.test(s)) return "Proposed";
  if(/committed/i.test(s)) return "Committed";
  if(/backlog/i.test(s)) return "Backlogged";
  if(/complete/i.test(s)) return "Complete";
  if(/eliminat/i.test(s)) return "Eliminated";
  if(/concept/i.test(s)) return "Concept";
  return null;
}
function capFindHdr(rows){
  for(var i=0;i<Math.min(6,rows.length);i++){
    var n = rows[i].map(normHeader);
    if(n.indexOf("id")!==-1 && (n.indexOf("initiative name")!==-1 || n.indexOf("name")!==-1)) return i;
  }
  return 0;
}
function capParseInitiatives(csvText){
  if(!csvText) return [];
  var rows = parseCSV(csvText);
  if(rows.length === 0) return [];
  var hi = capFindHdr(rows);
  var hdr = rows[hi];
  var body = rows.slice(hi+1);
  var get = makeRowAccessor(hdr);
  return body.reduce(function(acc, row){
    var id = get(row, "ID");
    var name = get(row, "Initiative Name", "Name");
    if(!id || !name) return acc;
    var gm = String(get(row, "5 year Goal", "Goal", "5-year Goal")).match(/(\d)/);
    var g = gm ? gm[1] : "";
    if(!GOALS[g]) return acc;
    var q3s = get(row, "Q3 2026 Status", "Q3 Status");
    var q2s = get(row, "Q2 2026 Status", "Q2 Status");
    var status = capParseStatus(q3s) || capParseStatus(q2s);
    var projType = get(row, "Project Type", "Type");
    var isConcept = /concept/i.test(projType);
    if(status === "Complete" || status === "Concept" || status === "Eliminated" || status === "Backlogged" || isConcept) return acc;
    acc.push({
      id:id, name:name, goal:g, status:status,
      isNew: /^new\b/i.test(projType),
      obj: get(row, "26 Obj", "Objective", "Obj", "Objective #", "Obj #"),
      objOwner: get(row, "Obj Owner", "Objective Owner", "Owner"),
      poc: get(row, "POC or PdM", "POC", "PdM"),
      shortDesc: get(row, "Short Description (for publishing)", "Short Description", "Initiative Summary", "Summary") ||
                 get(row, "Initiative Full Description", "Full Description", "Description"),
      fullDesc: get(row, "Initiative Full Description", "Full Description", "Description"),
      objName: get(row, "Objective Name", "Obj Name"),
    });
    return acc;
  }, []);
}

function capParseCapacity(csvText){
  if(!csvText) return {_mismatches: []};
  var rows = parseCSV(csvText);
  if(rows.length === 0) return {_mismatches: []};
  var hi = 0;
  for(var i=0;i<Math.min(6,rows.length);i++){
    if(rows[i][0] && normHeader(rows[i][0]) === "id"){ hi = i; break; }
  }
  var mismatches = [];
  function findCellAbove(col, maxScan){
    var limit = Math.max(0, hi - (maxScan || 3));
    for(var r = hi - 1; r >= limit; r--){
      var cell = String((rows[r] || [])[col] || "").trim();
      if(cell) return cell;
    }
    return "";
  }
  CAP_TEAMS.forEach(function(expected, idx){
    var col = CAP_TEAM_COL_START + (idx * 5);
    var found = findCellAbove(col, 3);
    if(found && found.toLowerCase() !== expected.toLowerCase()){
      var norm = function(s){return s.toLowerCase().replace(/[^a-z0-9]/g,"");};
      if(norm(found) !== norm(expected)){
        mismatches.push("Position "+(idx+1)+" (col "+col+"): expected '"+expected+"', sheet shows '"+found+"'");
      }
    }
  });
  var get = makeRowAccessor(rows[hi]);
  var body = rows.slice(hi+1);
  var map = {};
  body.forEach(function(row){
    var id = get(row, "ID");
    if(!id || !/^\d+\.\d+/.test(id)) return;
    var cfr = get(row, "Confidence Factor");
    var cf = cfr.includes("%") ? parseFloat(cfr)/100 : (parseFloat(cfr) || 0);
    var lbl = String(row[2] || "").trim();
    var cm = lbl.match(/(\d+)/);
    function int(k){return parseInt(get(row, k)) || 0;}
    var performers = [];
    CAP_TEAMS.forEach(function(name, i){
      var base = CAP_TEAM_COL_START + (i * 5);
      if(base >= row.length) return;
      var isPerformer = String(row[base] || "").trim() === "1";
      if(!isPerformer) return;
      var q3loe = String(row[base+1] || "").trim();
      var totalLoe = String(row[base+2] || "").trim();
      var staff = String(row[base+3] || "").trim();
      var notes = String(row[base+4] || "").trim();
      performers.push({name:name, q3loe:q3loe, totalLoe:totalLoe, staff:staff, notes:notes});
    });
    map[id] = {
      cf: isNaN(cf) ? 0 : cf, lbl: lbl,
      ciNum: cm ? parseInt(cm[1]) : null,
      performers: int("Performers"), committed: int("Committed"),
      posXS: int("Possibly - XS"), posS: int("Possibly - S"), posM: int("Possibly - M"),
      posL: int("Possibly - L"), posXL: int("Possibly - XL"),
      noCapacity: int("No Capacity Remaining"), notPerforming: int("Not Performing"),
      teams: performers,
    };
  });
  Object.defineProperty(map, "_mismatches", {value:mismatches, enumerable:false});
  return map;
}

function CapTeamSummaryCard(props){
  var teamName = props.teamName, entries = props.entries, onSelect = props.onSelect;
  if(!entries || !entries.length) return null;
  function loeNum(v){var n = parseInt(v, 10); return isNaN(n) ? 0 : n;}
  var byTier = {D:[], P:[], N:[]};
  entries.forEach(function(e){if(byTier[e.response.staff]) byTier[e.response.staff].push(e);});
  ["D","P","N"].forEach(function(k){
    byTier[k].sort(function(a, b){return loeNum(b.response.q3loe) - loeNum(a.response.q3loe);});
  });
  function csvEscape(v){var s = v == null ? "" : String(v); if(/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"'; return s;}
  function downloadCsv(){
    var headers = ["Team","Initiative ID","Initiative","Goal","Staffing","Q3 LOE","3-Quarter LOE","Notes"];
    var rows = [headers];

function CapacityView(props){
  var data = props.data;
  var [drillRaw, setDrillRaw] = useState(null);
  var [goalFilter, setGoalFilter] = useState("all");
  var [tierFilter, setTierFilter] = useState("all");
  var [search, setSearch] = useState("");
  var [teamFilter, setTeamFilter] = useState([]);
  var [sortState, setSortState] = useState({col:"ci", dir:"asc"});
  var [bannerDismissed, setBannerDismissed] = useState(false);
  var [guideOpen, setGuideOpen] = useState(false);

  function setDrill(v){ setDrillRaw(v); if(v) scrollViewportToTop(); }
  var drill = drillRaw;

  var initiatives = useMemo(function(){
    if(data.state.status !== "ready") return [];
    return capParseInitiatives(data.state.planningCsv);
  }, [data.state.status, data.state.planningCsv]);

  var capData = useMemo(function(){
    if(data.state.status !== "ready") return {_mismatches: []};
    return capParseCapacity(data.state.capacityCsv);
  }, [data.state.status, data.state.capacityCsv]);

  var goalsRef = useMemo(function(){
    if(data.state.status !== "ready") return {};
    return qpeNormalizeGoals(data.state.goalsCsv);
  }, [data.state.status, data.state.goalsCsv]);

  var mismatches = capData._mismatches || [];

  useEffect(function(){ setBannerDismissed(false); }, [mismatches.length]);

  useEffect(function(){
    if(props.selectedInitiativeId && initiatives.length > 0){
      var match = initiatives.find(function(i){return i.id === props.selectedInitiativeId;});
      if(match) setDrill(match.id);
    }
  }, [props.selectedInitiativeId, initiatives]);

  var items = useMemo(function(){
    return initiatives.map(function(i){return {init:i, cap:capData[i.id] || null};});
  }, [initiatives, capData]);

  var buckets = useMemo(function(){
    var high = [], med = [], risk = [], awaiting = [];
    var goalHealth = {};
    Object.keys(GOALS).forEach(function(k){goalHealth[k] = {high:0, med:0, risk:0, noData:0, total:0};});
    items.forEach(function(x){
      var gh = goalHealth[x.init.goal];
      if(gh) gh.total++;
      var tier = capCiTier(x.cap ? x.cap.ciNum : null);
      if(tier === "none"){awaiting.push(x); if(gh) gh.noData++; return;}
      if(tier === "high"){high.push(x); if(gh) gh.high++;}
      else if(tier === "med"){med.push(x); if(gh) gh.med++;}
      else {risk.push(x); if(gh) gh.risk++;}
    });
    return {high:high, med:med, risk:risk, awaiting:awaiting, goalHealth:goalHealth};
  }, [items]);

  var health = useMemo(function(){
    var rated = [].concat(buckets.high, buckets.med, buckets.risk);
    var sum = 0; rated.forEach(function(x){sum += x.cap.ciNum;});
    return {
      high: buckets.high.length, med: buckets.med.length, risk: buckets.risk.length,
      noData: buckets.awaiting.length,
      avg: rated.length ? Math.round(sum/rated.length*10)/10 : null,
      total: items.length
    };
  }, [items, buckets]);

  var insights = useMemo(function(){
    var teamCounts = {}, teamTotals = {};
    items.forEach(function(x){
      if(x.cap && x.cap.teams){
        x.cap.teams.forEach(function(t){
          teamTotals[t.name] = (teamTotals[t.name] || 0) + 1;
          if(t.staff === "N") teamCounts[t.name] = (teamCounts[t.name] || 0) + 1;
        });
      }
    });
    var topRisks = buckets.risk.slice()
      .sort(function(a, b){
        var ac = a.cap.ciNum, bc = b.cap.ciNum;
        if(ac !== bc) return ac - bc;
        return (b.cap.noCapacity || 0) - (a.cap.noCapacity || 0);
      }).slice(0, 5);
    var bottlenecks = Object.keys(teamCounts).map(function(name){return {name:name, count:teamCounts[name], total:teamTotals[name] || 0};})
      .sort(function(a, b){return b.count - a.count || a.name.localeCompare(b.name);}).slice(0, 7);
    return {goalHealth: buckets.goalHealth, topRisks: topRisks, bottlenecks: bottlenecks, awaiting: buckets.awaiting};
  }, [items, buckets, health]);

  function compareIds(a, b){
    var ap = String(a).split(".").map(Number);
    var bp = String(b).split(".").map(Number);
    for(var i = 0; i < Math.max(ap.length, bp.length); i++){
      var av = ap[i] || 0, bv = bp[i] || 0;
      if(av !== bv) return av - bv;
    }
    return 0;
  }

  var filtered = useMemo(function(){
    var out = items.filter(function(x){
      if(goalFilter !== "all" && x.init.goal !== goalFilter) return false;
      if(tierFilter !== "all"){var t = capCiTier(x.cap ? x.cap.ciNum : null); if(t !== tierFilter) return false;}
      if(teamFilter.length > 0){
        var teamsOnInit = (x.cap && x.cap.teams) ? x.cap.teams.map(function(t){return t.name;}) : [];
        var hit = teamFilter.some(function(t){return teamsOnInit.indexOf(t) !== -1;});
        if(!hit) return false;
      }
      if(search){var q = search.toLowerCase(); if(!x.init.name.toLowerCase().includes(q) && !x.init.id.includes(q)) return false;}
      return true;
    });
    var col = sortState.col, asc = sortState.dir === "asc";
    out.sort(function(a, b){
      var av, bv;
      if(col === "ci"){av = a.cap ? (a.cap.ciNum == null ? -1 : a.cap.ciNum) : -1; bv = b.cap ? (b.cap.ciNum == null ? -1 : b.cap.ciNum) : -1; return asc ? av - bv : bv - av;}
      if(col === "id" || col === "name"){return asc ? compareIds(a.init.id, b.init.id) : compareIds(b.init.id, a.init.id);}
      if(col === "goal"){return asc ? a.init.goal.localeCompare(b.init.goal) : b.init.goal.localeCompare(a.init.goal);}
      if(col === "committed"){av = a.cap ? a.cap.committed : 0; bv = b.cap ? b.cap.committed : 0; return asc ? av - bv : bv - av;}
      return 0;
    });
    return out;
  }, [items, goalFilter, tierFilter, teamFilter, search, sortState]);

  function toggleSort(col){
    setSortState(function(p){return {col:col, dir:p.col === col && p.dir === "asc" ? "desc" : "asc"};});
  }

  var teamSummaries = useMemo(function(){
    if(!teamFilter.length) return [];
    return teamFilter.map(function(teamName){
      var entries = [];
      filtered.forEach(function(x){
        if(!x.cap || !x.cap.teams) return;
        var resp = null;
        for(var i = 0; i < x.cap.teams.length; i++){
          if(x.cap.teams[i].name === teamName){resp = x.cap.teams[i]; break;}
        }
        if(!resp) return;
        entries.push({init:x.init, cap:x.cap, response:resp});
      });
      return {teamName:teamName, entries:entries};
    });
  }, [filtered, teamFilter]);

  var drillItem = drill ? items.find(function(x){return x.init.id === drill;}) : null;

  if(data.state.status === "loading"){

function rmResolveGoal(rawValue){
  var s = String(rawValue || "").trim();
  if(RM_GOAL_KEY_MAP[s]) return RM_GOAL_KEY_MAP[s];
  var m = s.match(/^(\d)/);
  return m && GOALS[m[1]] ? m[1] : "";
}

};

  Complete:   {label:"Complete", icon:"✓", bg:"#D5F5E3", tx:"#1E8449", border:"#ABEBC6"},

};

function rmParseDate(s){
  if(!s) return null;
  s = String(s).trim();
  var slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(slash){ var yr = +slash[3]; if(yr < 100) yr += 2000; return new Date(yr, +slash[1]-1, +slash[2]); }
  var dash = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(dash) return new Date(+dash[1], +dash[2]-1, +dash[3]);
  return null;
}

const RM_TODAY = (function(){
  try {
    var params = new URLSearchParams(window.location.search || "");
    var asOf = params.get("asOf");
    if(asOf){ var d = rmParseDate(asOf); if(d) return d; }
  } catch(e){}
  return new Date();
})();

const RM_DEFAULT_RANGE = (function(){
  var now = new Date();
  var startY = now.getFullYear(), startM = now.getMonth();
  var currentQuarterEndM = Math.floor(startM / 3) * 3 + 2;
  var endDate = new Date(startY, currentQuarterEndM + 9, 1);
  var fmt = function(y, m){ return y + "-" + String(m + 1).padStart(2, "0"); };
  return { start: fmt(startY, startM), end: fmt(endDate.getFullYear(), endDate.getMonth()) };
})();

function rmNf(){
  for(var i=0;i<arguments.length;i++){
    var x = arguments[i];
    if(x != null && String(x).trim() !== "") return String(x).trim();
  }
  return "";
}
function rmHasFullDates(item){ return Boolean(item && item.start && item.end); }
function rmIsTBD(item){ return Boolean(item && !rmHasFullDates(item) && !item.quarter); }
function rmIsComplete(item){
  if(!item) return false;
  if(/^complete/i.test(item.planningStatus || "")) return true;
  var end = rmParseDate(item.end);
  return Boolean(end && end < RM_TODAY);
}
function rmInitStatusDisplay(item){
  if(!item) return null;
  if(rmIsComplete(item)) return RM_INIT_STATUS_CFG.Complete;
  var s = item.planningStatus || "";
  if(s === "Backlogged") return RM_INIT_STATUS_CFG.Backlogged;
  if(s === "Not Funded") return RM_INIT_STATUS_CFG["Not Funded"];
  if(s === "Proposed")   return RM_INIT_STATUS_CFG.Proposed;
  return null;
}
function rmExtractParentId(p){
  if(!p) return "";
  var t = String(p).split(" ")[0].trim();
  return /^\d+(\.\d+)*$/.test(t) ? t : "";
}
function rmGoalOrder(k){ return GOALS[k] ? Number(GOALS[k].num) : 99; }
function rmFmtDate(s){
  if(!s) return "";
  var d = rmParseDate(s);
  if(!d) return s;
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function rmGenMonths(vs, ve){
  var a = [], y = vs.getFullYear(), m = vs.getMonth();
  for(;;){
    var s = new Date(y, m, 1);
    if(s > ve) break;
    var end = new Date(y, m+1, 0);
    a.push({label:RM_MONTHS[m], start:s, end:end, q:"Q"+(Math.floor(m/3)+1)+" "+y});
    if(++m > 11){ m = 0; y++; }
  }
  return a;
}
function rmGroupByQuarter(months){
  var qs = [], cur = null;
  months.forEach(function(m, i){
    if(!cur || cur.q !== m.q){ cur = {q:m.q, start:i, count:1}; qs.push(cur); }
    else cur.count++;
  });
  return qs;
}
function rmMonthOpts(){
  var a = [];
  for(var y = 2025; y <= 2029; y++){
    for(var m = 0; m < 12; m++){
      a.push({label: RM_MONTHS[m]+" "+y, value: y+"-"+String(m+1).padStart(2,"0")});
    }
  }
  return a;
}
const RM_MONTH_OPTS = rmMonthOpts();
function rmFindQuarterCol(q, cols){ if(!q) return null; return cols.find(function(c){return c.q === q.trim();}) || null; }
function rmSpreadMs(ms, pctFn){
  var pos = ms.map(function(m){
    var raw = pctFn(m.start, false);
    if(raw === null) return null;
    var clamped = Math.max(0, Math.min(100, raw));
    return Object.assign({}, m, {pv:clamped, clipped: raw !== clamped});
  }).filter(function(m){return m !== null;});
  pos.sort(function(a, b){return a.pv - b.pv;});
  var res = [];
  for(var i = 0; i < pos.length; i++){
    var yo = 0;
    for(var j = 0; j < res.length; j++){
      if(Math.abs(pos[i].pv - res[j].pv) < 2){
        yo = res[j].yo === 0 ? -8 : res[j].yo === -8 ? 8 : res[j].yo + 8;
      }
    }
    res.push(Object.assign({}, pos[i], {yo:yo}));
  }
  return res;
}
function rmExtractDepIds(value){
  var text = Array.isArray(value) ? value.join("; ") : String(value || "");
  var seen = {}, out = [];
  text.replace(/\b\d+(?:\.\d+)+\b/g, function(id){
    if(!seen[id]){ seen[id] = true; out.push(id); }

function rmParseCsv(csvText){
  if(!csvText) return [];
  var rows = [], row = [], cell = "", inQ = false;
  for(var i = 0; i < csvText.length; i++){
    var c = csvText[i], n = csvText[i+1];
    if(c === '"' && inQ && n === '"'){ cell += '"'; i++; }
    else if(c === '"') inQ = !inQ;
    else if(c === ',' && !inQ){ row.push(cell); cell = ""; }
    else if((c === '\n' || c === '\r') && !inQ){
      if(cell || row.length){ row.push(cell); rows.push(row); row = []; cell = ""; }
      if(c === '\r' && n === '\n') i++;
    }
    else cell += c;
  }
  if(cell || row.length){ row.push(cell); rows.push(row); }
  if(!rows.length) return [];
  var hdrs = rows.shift().map(function(h){return h.trim();});
  return rows.filter(function(r){return r.some(function(c){return c.trim() !== "";});}).map(function(r){

  });
}

function rmNormalizeRows(rows){

    if(String(r["showonroadmap"] || "").toUpperCase() === "FALSE") continue;

    var id = rmNf(r["id"]), cat = rmNf(r["cat"]).toLowerCase(), icon = rmNf(r["icon"]).toLowerCase(), name = rmNf(r["name"]);

      var drc = String(r["drc"] || "").toUpperCase() === "TRUE";
      var ppsc = String(r["ppsc"] || "").toUpperCase() === "TRUE";
      var biobank = String(r["biobank"] || "").toUpperCase() === "TRUE";

        depIds: rmExtractDepIds([rmNf(r["depends on ids"], r["depends on id"])]).concat(rmExtractDepIds(deps)),
        dependencyType: rmNf(r["dependency type"]),
        requiredBy: rmNf(r["required by"]),
        impactIfLate: rmNf(r["impact if late"]),
        mitigationNotes: rmNf(r["mitigation / notes"], r["mitigation notes"]),
        notes: cleanNotes.length ? cleanNotes.join("\n") : null,
        description: rmNf(r["short description (for publishing)"], r["short description"], r["summary"], r["description"]) || null,
        goalOwner: rmNf(r["goal owner"], r["goal owner name"]),
        obj: rmNf(r["26 obj"], r["objective"], r["obj"], r["objective #"], r["obj #"]),
        objName: rmNf(r["objective name"], r["obj name"]),
        objOwner: rmNf(r["obj owner"], r["objective owner"], r["owner"]),
        poc: rmNf(r["poc or pdm"], r["poc / pdm"], r["poc"], r["pdm"]),
      });
    } else if(!id && (icon === "star" || icon === "diamond")){
      var pid = rmExtractParentId(rmNf(r["parent"]));
      if(!pid) continue;
      var mc2 = /tech readiness/i.test(cat) ? "tech readiness" : (cat === "tech" || cat === "comms" ? cat : "");
      mils.push({
        id:("MS-"+pid+"-"+icon+"-"+name+"-"+i).replace(/[^a-zA-Z0-9._-]+/g,"-").slice(0,80),
        name:name, start:rmNf(r["start"]) || null, end:rmNf(r["end"]) || null,
