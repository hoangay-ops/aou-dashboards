;height:14px;border-radius:3px;background:#EAECEE;color:#555;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:0}.done{font-size:8px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700;background:#D5F5E3;color:#1E8449;border-radius:4px;padding:1px 5px}.month-grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat("+monthCount+",1fr);z-index:1;pointer-events:none}.month-grid>div{border-right:1px solid #f0f0f0;min-height:100%}.month-grid>div:last-child{border-right:none}.bar{position:absolute;top:50%;height:18px;transform:translateY(-50%);border-radius:4px;z-index:2;color:#1a1a1a;font-size:8px;font-weight:700;line-height:18px;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.qbar{position:absolute;top:50%;height:16px;transform:translateY(-50%);border:1.5px dashed currentColor;border-radius:3px;background:rgba(255,255,255,.85);z-index:2;text-align:center;font-size:8px;font-weight:700;line-height:14px}.tbdbar{position:absolute;left:4%;right:4%;top:50%;height:8px;transform:translateY(-50%);border-radius:3px;background:repeating-linear-gradient(90deg,#ddd 0,#ddd 4px,transparent 4px,transparent 8px);opacity:.8;font-size:7px;color:#999;font-weight:700;line-height:8px;z-index:2}.marker{position:absolute;top:50%;transform:translate(-50%,-50%);z-index:3;color:#F5A800;font-size:13px;text-shadow:0 1px 2px rgba(0,0,0,.25);line-height:1}.today{position:absolute;top:0;bottom:0;width:1.5px;background:#C0392B;opacity:.7;z-index:4}@media print{body{zoom:.98}}";
  printWin.document.open();
  printWin.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Program Roadmap</title><style>"+printCss+"</style></head><body>"+html+"</body></html>");
  printWin.document.close();
  setTimeout(function(){
    try { printWin.focus(); printWin.print(); }
    catch(e){ alert("The print view opened, but the print dialog was blocked. Use File > Print in the new tab."); }
  }, 350);
}

function RoadmapView(props){
  var data = props.data;
  var [items, setItems] = useState([]);
  var [startM, setStartM] = useState(RM_DEFAULT_RANGE.start);
  var [endM, setEndM] = useState(RM_DEFAULT_RANGE.end);
  var [groupBy, setGroupBy] = useState("goal");
  var [grouped, setGrouped] = useState(true);
  var [showAud, setShowAud] = useState(true);
  var [showLeg, setShowLeg] = useState(true);
  var [hideTBD, setHideTBD] = useState(true);
  var [milestoneView, setMilestoneView] = useState("both");
  var [sortBy, setSortBy] = useState("start");
  var [search, setSearch] = useState("");
  var [fGoals, setFGoals] = useState([]);
  var [fTypes, setFTypes] = useState([]);
  var [fAwardees, setFAwardees] = useState([]);
  var [expandedRaw, setExpandedRaw] = useState(null);
  var [tooltip, setTooltip] = useState(null);
  var [depMode, setDepMode] = useState(false);
  var [depFocus, setDepFocus] = useState(null);
  var [guideOpen, setGuideOpen] = useState(false);

  function setExpanded(v){ setExpandedRaw(v); if(v) scrollViewportToTop(); }
  var expanded = expandedRaw;

  useEffect(function(){
    if(data.state.status !== "ready") return;
    var rawRows = rmParseCsv(data.state.roadmapCsv);
    var normalized = rmNormalizeRows(rawRows);
    var planningLookup = rmParsePlanningLookup(data.state.planningCsv);
    var enriched = rmEnrichRows(normalized, planningLookup);
    setItems(enriched);
  }, [data.state.status, data.state.roadmapCsv, data.state.planningCsv]);

  var capData = useMemo(function(){
    if(data.state.status !== "ready") return {};
    return capParseCapacity(data.state.capacityCsv);
  }, [data.state.status, data.state.capacityCsv]);

  function noCapacityTeams(initId){
    if(!initId) return null;
    var cap = capData[initId] || capData[String(initId).trim()];
    if(!cap || !cap.teams) return null;
    var flagging = cap.teams.filter(function(t){return t.staff === "N";});
    return flagging.length > 0 ? flagging : null;
  }

  var flagDebug = useMemo(function(){
    var capIds = Object.keys(capData).filter(function(k){return k.indexOf("_") !== 0;});
    var matched = 0, flagged = 0;
    (items || []).forEach(function(it){
      if(it.cat !== "initiative") return;
      if(capData[it.id]){
        matched++;
        var teams = noCapacityTeams(it.id);
        if(teams) flagged++;
      }
    });
    return {capRows: capIds.length, matched: matched, flagged: flagged};
  }, [items, capData]);

  useEffect(function(){
    if(props.selectedInitiativeId && items.length > 0){
      var match = items.find(function(i){return i.cat === "initiative" && i.id === props.selectedInitiativeId;});
      if(match){
        setExpanded(match.id);
        if(depMode) setDepFocus(match.id);
      }
    }
  }, [props.selectedInitiativeId, items]);

  var VS = useMemo(function(){ var p = startM.split("-"); return new Date(+p[0], +p[1]-1, 1, 0, 0, 0, 0); }, [startM]);
  var VE = useMemo(function(){ var p = endM.split("-"); return new Date(+p[0], +p[1], 0, 23, 59, 59, 999); }, [endM]);

  var pct = useCallback(function(d, isEnd, noClamp){
    if(!d) return null;
    var D = rmParseDate(d);
    if(!D) return null;
    if(isEnd){ D = new Date(D.getFullYear(), D.getMonth(), D.getDate()+1); }
    var t = VE - VS;
    var v = ((D - VS) / t) * 100;
    return noClamp ? v : Math.max(0, Math.min(100, v));
  }, [VS, VE]);

  var cols = useMemo(function(){ return rmGenMonths(VS, VE); }, [VS, VE]);
  var quarters = useMemo(function(){ return rmGroupByQuarter(cols); }, [cols]);
  var allInit = useMemo(function(){ return items.filter(function(i){return i.cat === "initiative";}); }, [items]);
  var msItems = useMemo(function(){ return items.filter(function(i){return i.cat === "comms" || i.cat === "tech";}); }, [items]);

  var tbdHiddenCount = useMemo(function(){
    if(!hideTBD) return 0;
    return allInit.filter(function(r){
      if(fGoals.length && fGoals.indexOf(r.goal) === -1) return false;
      if(fTypes.length && fTypes.indexOf(r.type) === -1) return false;
      return rmIsTBD(r);
    }).length;
  }, [allInit, hideTBD, fGoals, fTypes]);

  var filtered = useMemo(function(){
    var d = allInit.filter(function(r){
      if(fGoals.length && fGoals.indexOf(r.goal) === -1) return false;
      if(fTypes.length && fTypes.indexOf(r.type) === -1) return false;
      if(fAwardees.length && !fAwardees.some(function(a){return r.awardees && r.awardees.indexOf(a) !== -1;})) return false;
      if(hideTBD && rmIsTBD(r)) return false;
      if(search){
        var q = search.toLowerCase();
        if(r.name.toLowerCase().indexOf(q) === -1 && r.id.toLowerCase().indexOf(q) === -1) return false;
      }
      return true;
    });
    d.sort(function(a, b){
      if(sortBy === "start") return (a.start || "9999") > (b.start || "9999") ? 1 : -1;
      if(sortBy === "end")   return (a.end   || "9999") > (b.end   || "9999") ? 1 : -1;
      if(sortBy === "name")  return a.name.localeCompare(b.name);
      if(sortBy === "id"){
        var pa = a.id.split(".").map(Number), pb = b.id.split(".").map(Number);
        for(var k = 0; k < Math.max(pa.length, pb.length); k++){
          var va = pa[k] || 0, vb = pb[k] || 0;
          if(va !== vb) return va - vb;
        }
        return 0;
      }
      return a.id.localeCompare(b.id);
    });
    return d;
  }, [allInit, fGoals, fTypes, fAwardees, hideTBD, search, sortBy]);

  var isAnyFilterActive = fGoals.length > 0 || fTypes.length > 0 || fAwardees.length > 0 || search !== "";
  function clearFiltersOnly(){ setFGoals([]); setFTypes([]); setFAwardees([]); setSearch(""); }

  var getMs = useCallback(function(id){
    return msItems.filter(function(m){
      if(m.parent !== id) return false;
      if(milestoneView === "tech"  && m.icon !== "star") return false;
      if(milestoneView === "comms" && m.icon !== "diamond") return false;
      return true;
    });
  }, [msItems, milestoneView]);

  var groups = useMemo(function(){
    if(!grouped) return [["All", filtered]];
    var key = groupBy === "goal" ? "goal" : "type", g = {};
    filtered.forEach(function(r){ var k = r[key] || "Unknown"; if(!g[k]) g[k] = []; g[k].push(r); });
    return Object.entries(g).sort(function(a, b){
      return groupBy === "goal" ? rmGoalOrder(a[0]) - rmGoalOrder(b[0]) : RM_TYPE_KEYS.indexOf(a[0]) - RM_TYPE_KEYS.indexOf(b[0]);
    });
  }, [filtered, grouped, groupBy]);

  function gc(k){ return GOALS[k] ? goalBorderColor(GOALS[k]) : RM_TYPE_COLOR[k] || "#888"; }
  function gl(k){ return GOALS[k] ? "Goal "+GOALS[k].num+": "+GOALS[k].short : k; }

  function reset(){
    setStartM(RM_DEFAULT_RANGE.start); setEndM(RM_DEFAULT_RANGE.end);
    setGroupBy("goal"); setSortBy("start");
    setGrouped(true); setShowAud(true); setShowLeg(true); setHideTBD(true);
    setMilestoneView("both"); setSearch("");
    setFGoals([]); setFTypes([]); setFAwardees([]);
    setExpanded(null); setDepMode(false); setDepFocus(null);
  }

  var todayP = pct(RM_TODAY.getFullYear()+"-"+String(RM_TODAY.getMonth()+1).padStart(2,"0")+"-"+String(RM_TODAY.getDate()).padStart(2,"0"), false);

  var depGraph = useMemo(function(){
    var upstream = {}, downstream = {};
    allInit.forEach(function(it){
      var deps = rmRelatedDepIds(it);
      upstream[it.id] = deps;
      deps.forEach(function(depId){
        if(!downstream[depId]) downstream[depId] = [];
        if(downstream[depId].indexOf(it.id) === -1) downstream[depId].push(it.id);
      });
    });
    return {upstream:upstream, downstream:downstream};
  }, [allInit]);

  var expItem = expanded ? items.find(function(i){return i.id === expanded;}) : null;
  var expMs = expanded ? getMs(expanded) : [];

  var depFocusData = useMemo(function(){
    if(!depFocus) return null;
    var focus = rmInitById(allInit, depFocus) || rmInitById(items, depFocus);
    if(!focus) return null;
    var upstreamIds = rmRelatedDepIds(focus);
    var upstream = upstreamIds.map(function(id){return rmInitById(allInit, id) || rmInitById(items, id) || {id:id,name:"Unknown initiative"};});
    var downstream = allInit.filter(function(it){return rmRelatedDepIds(it).indexOf(focus.id) !== -1;});
    return {focus:focus, upstream:upstream, downstream:downstream};
  }, [depFocus, allInit, items]);

  function depRole(id){
    if(!depMode || !depFocusData) return "normal";
    if(String(id) === String(depFocusData.focus.id)) return "focus";
    if(depFocusData.upstream.some(function(x){return String(x.id) === String(id);})) return "upstream";
    if(depFocusData.downstream.some(function(x){return String(x.id) === String(id);})) return "downstream";
    return "muted";
  }

  function selectInitiative(id){
    setExpanded(expanded === id ? null : id);
    if(depMode) setDepFocus(id);
  }

  useEffect(function(){
    var msByParent = {};
    filtered.forEach(function(it){ msByParent[it.id] = getMs(it.id); });
    window.__roadmapPrintData = {
      groups:groups, grouped:grouped, cols:cols, quarters:quarters,
      vs:VS, ve:VE, today:RM_TODAY, msByParent:msByParent,
    };
  }, [groups, grouped, cols, quarters, VS, VE, filtered, getMs]);

  if(data.state.status === "loading"){
    return <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#999",fontSize:13}}>Loading roadmap data…</div>;
  }
  if(data.state.status === "error"){
    return (
      <div style={{flex:1,padding:40,color:"#7B241C"}}>
        <div style={{padding:"20px 24px",background:"#FDECEA",border:"1px solid #E6B0AA",borderRadius:8,maxWidth:600,margin:"0 auto"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>Could not load roadmap data</div>
          <div style={{fontSize:12,marginBottom:12}}>{data.state.error}</div>
          <button onClick={data.reload} style={{padding:"6px 14px",border:"1px solid #C0392B",background:"#fff",color:"#C0392B",borderRadius:6,cursor:"pointer",fontWeight:600}}>Retry</button>
        </div>
      </div>
    );
  }

  var GOAL_KEYS = Object.keys(GOALS);

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#fff"}}>
      <div style={{padding:"6px 24px",borderBottom:"1px solid #ebebeb",display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,background:"#fafafa"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#aaa"}}>{RM_TODAY.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
          {flagDebug.capRows > 0 && (
            <span title={"Capacity rows loaded: "+flagDebug.capRows+" · Roadmap initiatives matched to capacity rows: "+flagDebug.matched+" · Initiatives with at least one 'No Capacity' flag: "+flagDebug.flagged}
              style={{fontSize:10,padding:"3px 8px",borderRadius:10,background:flagDebug.flagged > 0 ? "#FDECEA" : "#f5f5f5",color:flagDebug.flagged > 0 ? "#922b21" : "#999",fontWeight:600,cursor:"help"}}>
              🚧 {flagDebug.flagged} flagged · {flagDebug.matched}/{allInit.length} matched
            </span>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <HelpButton open={guideOpen} onClick={function(){setGuideOpen(true);}}/>
          <button onClick={rmPrintRoadmap} title="Print the currently filtered roadmap" style={{fontSize:11.5,padding:"4px 11px",border:"1px solid #C8DCF0",borderRadius:6,background:"#EBF5FB",color:"#2471A3",cursor:"pointer",fontWeight:500}}>Print</button>
          <button onClick={reset} style={{fontSize:11.5,padding:"4px 11px",border:"1px solid #e0e0e0",borderRadius:6,background:"#fff",cursor:"pointer"}}>Reset</button>
          <span style={{fontSize:11,color:"#aaa"}}>Showing</span>
          <span style={{fontSize:13,fontWeight:700,color:"#333"}}>{filtered.length}</span>
          <span style={{fontSize:11,color:"#aaa"}}>of {allInit.length} initiatives</span>
          {isAnyFilterActive && <span style={{fontSize:10,color:"#C0392B",marginLeft:4}}>↓ {allInit.length - filtered.length} hidden by filter</span>}
        </div>
      </div>

      <div style={{padding:"8px 24px",borderBottom:"1px solid #ebebeb",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",background:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.05}}>Range</span>
          <select style={{fontSize:11.5,padding:"4px 7px",border:"1px solid #e0e0e0",borderRadius:6}} value={startM} onChange={function(e){setStartM(e.target.value);}}>
            {RM_MONTH_OPTS.map(function(o){return <option key={o.value} value={o.value}>{o.label}</option>;})}
          </select>
          <span style={{color:"#ccc"}}>→</span>
          <select style={{fontSize:11.5,padding:"4px 7px",border:"1px solid #e0e0e0",borderRadius:6}} value={endM} onChange={function(e){setEndM(e.target.value);}}>
            {RM_MONTH_OPTS.map(function(o){return <option key={o.value} value={o.value}>{o.label}</option>;})}
          </select>
        </div>
        <RmSep/>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.05}}>Group</span>
          <RmSegBtn active={groupBy === "goal"} onClick={function(){setGroupBy("goal");}}>Goal</RmSegBtn>
          <RmSegBtn active={groupBy === "type"} onClick={function(){setGroupBy("type");}}>Audience</RmSegBtn>
        </div>
        <RmSep/>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.05}}>Sort</span>
          <select style={{fontSize:11.5,padding:"4px 7px",border:"1px solid #e0e0e0",borderRadius:6}} value={sortBy} onChange={function(e){setSortBy(e.target.value);}}>
            <option value="start">Start date</option>
            <option value="end">End date</option>
            <option value="id">ID</option>
            <option value="name">Name</option>
          </select>
        </div>
        <RmSep/>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.05}}>Filter</span>
          <RmMultiSelect label="Goal" options={GOAL_KEYS} selected={fGoals} onChange={setFGoals}
            getKey={function(k){return k;}}
            getLabel={function(k){return "G"+GOALS[k].num+": "+GOALS[k].short;}}
            getColor={function(k){return GOALS[k].color;}}/>
          <RmMultiSelect label="Audience" options={RM_TYPE_KEYS} selected={fTypes} onChange={setFTypes}
            getKey={function(k){return k;}} getLabel={function(k){return k;}}
            getColor={function(k){return RM_TYPE_COLOR[k];}}/>
          <RmMultiSelect label="Awardee" options={RM_AWARDEE_KEYS} selected={fAwardees} onChange={setFAwardees}
            getKey={function(k){return k;}} getLabel={function(k){return k;}}
            getColor={function(k){return RM_AWARDEE_CFG[k].color;}}/>
          {isAnyFilterActive && <button onClick={clearFiltersOnly} style={{background:"none",border:"none",color:"#C0392B",fontSize:11.5,cursor:"pointer",fontWeight:500}}>✕ Clear</button>}
        </div>
        <RmSep/>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.05}}>Milestones</span>
          <RmSegBtn active={milestoneView === "both"} onClick={function(){setMilestoneView("both");}}>Both</RmSegBtn>
          <RmSegBtn active={milestoneView === "tech"} onClick={function(){setMilestoneView("tech");}}>★ Launch</RmSegBtn>
          <RmSegBtn active={milestoneView === "comms"} onClick={function(){setMilestoneView("comms");}}>◇ Key</RmSegBtn>
        </div>
        <RmSep/>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <RmTog on={depMode} onClick={function(){setDepMode(!depMode); if(depMode) setDepFocus(null);}} title="Turn on dependency highlighting, then click an initiative to see upstream and downstream impact.">↔ Dependency mode</RmTog>
        </div>
        <RmSep/>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <RmTog on={showAud} onClick={function(){setShowAud(!showAud);}}>Show badges</RmTog>
          <RmTog on={hideTBD} onClick={function(){setHideTBD(!hideTBD);}} title="TBD = initiatives with no scheduled start, end, or quarter.">
            {hideTBD && tbdHiddenCount > 0 ? "Hide TBD ("+tbdHiddenCount+")" : "Hide TBD"}
          </RmTog>
          <RmTog on={showLeg} onClick={function(){setShowLeg(!showLeg);}}>Legend</RmTog>
        </div>
        <div style={{marginLeft:"auto"}}>
          <input style={{fontSize:12,padding:"5px 11px",border:"1px solid #dcdcdc",borderRadius:18,width:200}} placeholder="🔍  Search…" value={search} onChange={function(e){setSearch(e.target.value);}}/>
        </div>
      </div>

      {showLeg && (
        <div style={{padding:"10px 24px",borderBottom:"1px solid #ebebeb",display:"flex",gap:0,alignItems:"center",flexWrap:"wrap",fontSize:11,color:"#888",background:"#fafafa",rowGap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",paddingRight:22,marginRight:22,borderRight:"1px solid #ebebeb"}}>
            <span style={{fontSize:9,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.5}}>Goals</span>
            {Object.entries(GOALS).map(function(pair){var k = pair[0], g = pair[1];
              return <span key={k} style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:10,height:10,borderRadius:2,background:g.color,display:"inline-block"}}/>{g.short}
              </span>;
            })}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",paddingRight:22,marginRight:22,borderRight:"1px solid #ebebeb"}}>
            <span style={{fontSize:9,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.5}}>Markers</span>
            <span style={{display:"flex",alignItems:"center",gap:6}}><RmStarIcon sz={13}/><span>Launch</span></span>
            <span style={{display:"flex",alignItems:"center",gap:6}}><RmDiamondIcon sz={13}/><span>Key</span></span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:9,textTransform:"uppercase",color:"#bbb",fontWeight:700,letterSpacing:.5}}>Audience</span>
            {RM_TYPE_KEYS.map(function(t){return (

        intro="Read the timeline left to right. Bars are initiatives, stars and diamonds are milestones, and the red line marks today."
        launchGlossary="https://docs.google.com/document/d/1hl_bN343i1azTm8nUwIQQs932pzeJXF3h7aKajR7fZE/edit?tab=t.0#heading=h.bttfzqlrvm2p"
        cards={[
          {icon:"📅", title:"Timeline", color:"#2471A3", bg:"#F4FAFF",
            body:<>Quarters and months run left to right. Colored bars show initiative duration. A red line marks today, and the current month is highlighted blue.</>},
          {icon:"★ ◇", title:"Milestones", color:"#F5A800", bg:"#FFFAF0",
            body:<><span style={{color:"#F5A800",fontWeight:800}}>★</span> Launch milestones and <span style={{color:"#F5A800",fontWeight:800}}>◇</span> key milestones sit on the parent initiative timeline. Hover for date and category; use the milestone filter to show one type.</>},
          {icon:"↔", title:"Dependency mode", color:"#7D6608", bg:"#FFF9EC",
            body:<>Turn on <strong>↔ Dependency mode</strong>, then click an initiative. The focus row turns amber, upstream dependencies turn yellow, impacted downstream rows turn blue, and unrelated rows fade.</>},
          {icon:"🔎", title:"Dependency impact", color:"#1F618D", bg:"#F4FAFF",
            body:<>The inspector panel shows structured dependency type, required-by date, impact if late, mitigation notes, plus clickable <strong>Depends on</strong> and <strong>Potentially impacted</strong> lists.</>},
          {icon:"🏷", title:"Roadmap details", color:"#607080", bg:"#fff",
            body:<>Inspector details show the shared identity block (Goal, Objective, POC), plus Roadmap-only Audience, Start, End, and Awardees.</>},
          {icon:"⚠", title:"Risks & TBD", color:"#C0392B", bg:"#FFF4F2",
            body:<><span style={{color:"#C0392B",fontWeight:800}}>⚠</span> Risks are highlighted in red. <strong>TBD</strong> items have no start, end, or quarter and can be hidden with the Hide TBD toggle.</>},
          {icon:"🚧", title:"No-capacity flag", color:"#922b21", bg:"#FDECEA",
            body:<>A <strong style={{background:"#FDECEA",color:"#922b21",border:"1px solid #E6B0AA",padding:"1px 4px",borderRadius:3,fontSize:9.5}}>🚧 N</strong> badge next to a row means N team(s) flagged "No Capacity Remaining" for that initiative on the current Capacity sheet. Click the badge to jump directly to that initiative on the Capacity tab.</>},
          {icon:"🖨", title:"Print & filters", color:"#185FA5", bg:"#F4FAFF",
            body:<>The <strong>Print</strong> button opens a clean, landscape-sized snapshot of the currently filtered roadmap in a new tab — ready to print or save as PDF.</>},
          {icon:"🔗", title:"Cross-view navigation", color:"#117A65", bg:"#F4FFFB",
            body:<>From the inspector, click <strong>View in QPE →</strong> or <strong>View in Capacity →</strong> to jump to the same initiative on the other dashboards.</>},
        ]}
        glossarySection={{
          title:"Goal colors",
          content: (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"7px 10px",fontSize:11.2,color:"#606b75"}}>
              {Object.keys(GOALS).map(function(k){var g = GOALS[k];
                return <span key={k} style={{display:"inline-flex",alignItems:"center",gap:6,minWidth:0}}>
                  <span style={{width:14,height:14,borderRadius:4,background:goalBorderColor(g),display:"inline-block",border:"1px solid rgba(0,0,0,.08)"}}/>
                  <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>G{g.num} {g.short}</span>
                </span>;
              })}
            </div>
          )
        }}
      />
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   APP SHELL + MOUNT
   ════════════════════════════════════════════════════════════════════════════ */

function App(){
  var [activeView, setActiveView] = useState("qpe");
  var [selectedInitiativeId, setSelectedInitiativeId] = useState(null);
  var data = useDataLoader();

  var psiUrlMap = useMemo(function(){
    if(data.state.status !== "ready") return {};
    return parsePsiUrlMap(data.state.psiUrlsCsv);
  }, [data.state.status, data.state.psiUrlsCsv]);

  var selectInitiative = useCallback(function(targetView, initiativeId){
    setActiveView(targetView);
    setSelectedInitiativeId(initiativeId);
  }, []);

  function handleTabClick(view){
    setActiveView(view);
    setSelectedInitiativeId(null);
  }

  var viewProps = {
    data: data,
    selectedInitiativeId: selectedInitiativeId,
    onNavigateView: selectInitiative,
    currentView: activeView,
    psiUrlMap: psiUrlMap,
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"14px 24px",background:"#fff",borderBottom:"1px solid #ececec",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:12}}>
        <div style={{minWidth:0}}>
          <div style={{fontSize:10.5,textTransform:"uppercase",letterSpacing:1.4,color:"#888",fontWeight:600,marginBottom:4}}>
            NIH · <AoU/> Research Program · {CYCLE.current}
          </div>
          <div style={{fontSize:20,fontWeight:700,color:"#111",lineHeight:1.2,letterSpacing:-0.2}}>
            Program Dashboards
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
          {data.state.status === "ready" && (
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#EAF7EF",color:"#1E8449",fontWeight:600}}>
              ● live · {data.state.loadedAt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
            </span>
          )}
          {data.state.status === "loading" && (
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#EBF5FB",color:"#2471A3",fontWeight:600}}>↻ loading…</span>
          )}
          {data.state.status === "error" && (
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#FDECEA",color:"#C0392B",fontWeight:600}} title={data.state.error}>● load failed</span>
          )}
          <button onClick={data.reload} title="Refresh all data" style={{fontSize:11.5,padding:"6px 12px",border:"1px solid #C8DCF0",borderRadius:6,background:"#EBF5FB",color:"#2471A3",cursor:"pointer",fontWeight:500}}>
            ↻ Refresh
          </button>
        </div>
      </div>

      <div className="tab-bar">
        <button className={"tab"+(activeView==="qpe"?" active":"")} onClick={function(){handleTabClick("qpe");}}>
          Quarterly Planning
        </button>
        <button className={"tab"+(activeView==="roadmap"?" active":"")} onClick={function(){handleTabClick("roadmap");}}>
          Roadmap
        </button>
        <button className={"tab"+(activeView==="capacity"?" active":"")} onClick={function(){handleTabClick("capacity");}}>
          Capacity Planning
        </button>
      </div>

      {activeView === "qpe"      && <QpeView {...viewProps}/>}
      {activeView === "roadmap"  && <RoadmapView {...viewProps}/>}
      {activeView === "capacity" && <CapacityView {...viewProps}/>}
    </div>
  );
}

function ErrorBoundary(props){
  React.Component.call(this, props);
  this.state = {err: null};
}
ErrorBoundary.prototype = Object.create(React.Component.prototype);
ErrorBoundary.prototype.constructor = ErrorBoundary;
ErrorBoundary.prototype.componentDidCatch = function(err){ this.setState({err: err}); };
ErrorBoundary.prototype.render = function(){
  if(this.state.err){
    var self = this;
    return React.createElement("div", {style:{padding:40,fontFamily:"monospace",fontSize:12,color:"#C0392B",background:"#FDECEA",margin:20,borderRadius:8,border:"1px solid #E6B0AA"}},
      React.createElement("div", {style:{fontSize:14,fontWeight:700,marginBottom:10}}, "Something broke rendering this view"),
      React.createElement("div", {style:{marginBottom:10}}, String(this.state.err.message || this.state.err)),
      React.createElement("button", {
        onClick: function(){ self.setState({err: null}); },
        style: {marginTop:12,padding:"6px 14px",border:"1px solid #C0392B",borderRadius:6,background:"#fff",color:"#C0392B",cursor:"pointer",fontWeight:600}
      }, "Reset view")
    );
  }
  return this.props.children;
};

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App, null))
);

</script>
</body>
</html>
